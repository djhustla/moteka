<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation SMS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .validation-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px 30px;
            text-align: center;
            color: white;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-2px);
        }

        .header-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .content {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #4a5568;
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 1.2rem;
        }

        input[type="text"],
        input[type="tel"],
        input[type="email"] {
            width: 100%;
            padding: 18px 18px 18px 52px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            background: white;
            color: #2d3748;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        .code-input {
            font-size: 1.3rem;
            letter-spacing: 8px;
            text-align: center;
            padding-left: 18px !important;
        }

        .hint {
            display: block;
            margin-top: 8px;
            font-size: 0.85rem;
            color: #718096;
            font-style: italic;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f7fafc;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #edf2f7;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Messages d'alerte */
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 20px 24px;
            border-radius: 14px;
            color: white;
            font-weight: 500;
            max-width: 400px;
            z-index: 1000;
            animation: slideInRight 0.3s ease-out;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .alert-success {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        }

        .alert-error {
            background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
        }

        .alert-icon {
            font-size: 1.5rem;
        }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .alert-message {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 0 10px;
            }

            .header {
                padding: 30px 20px 25px;
            }

            .header h1 {
                font-size: 1.6rem;
            }

            .header p {
                font-size: 0.9rem;
            }

            .content {
                padding: 30px 20px;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            input {
                padding: 16px 16px 16px 48px;
            }

            .code-input {
                letter-spacing: 6px;
            }
        }

        @media (max-width: 480px) {
            .header-icon {
                font-size: 2.8rem;
            }

            .back-btn {
                top: 15px;
                left: 15px;
                padding: 8px 12px;
                font-size: 0.8rem;
            }

            .alert {
                top: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
            }
        }

        /* Animation de chargement */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Effets de focus améliorés */
        input:focus {
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(135deg, #667eea 0%, #764ba2 100%) border-box;
            border: 2px solid transparent;
        }

        /* Effet de survol pour les icônes */
        .input-wrapper:hover .input-icon {
            color: #667eea;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="container">
    <div class="validation-card">
        <div class="header">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i> Retour
            </button>

            <div class="header-icon">
                <i class="fas fa-mobile-alt"></i>
            </div>

            <h1>Validation SMS</h1>
            <p>Entrez vos informations pour activer votre compte</p>
        </div>

        <div class="content">
            <form id="validationForm">
                <div class="form-group">
                    <label for="phoneOrEmail">
                        <i class="fas fa-user-circle"></i> Numéro de téléphone ou Email
                    </label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <i class="fas fa-user"></i>
                        </div>
                        <input type="text"
                               id="phoneOrEmail"
                               name="phoneOrEmail"
                               placeholder="+32412345678 ou email@exemple.com"
                               required>
                    </div>
                    <span class="hint">Utilisez le même que lors de l'inscription</span>
                </div>

                <div class="form-group">
                    <label for="code">
                        <i class="fas fa-key"></i> Code de validation
                    </label>
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <i class="fas fa-shield-alt"></i>
                        </div>
                        <input type="text"
                               id="code"
                               name="code"
                               class="code-input"
                               placeholder="123456"
                               maxlength="6"
                               pattern="[0-9]{6}"
                               inputmode="numeric"
                               required>
                    </div>
                    <span class="hint">Code à 6 chiffres reçu par SMS</span>
                </div>

                <div class="buttons">
                    <button type="submit" class="btn btn-primary" id="validateBtn">
                        <i class="fas fa-check-circle"></i>
                        <span>Valider le compte</span>
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="goToHome()">
                        <i class="fas fa-home"></i>
                        <span>Accueil</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Fonctions de navigation
    function goBack() {
        window.location.href = '/index.html';
    }

    function goToHome() {
        window.location.href = '/index.html';
    }

    // Formatage automatique du code
    const codeInput = document.getElementById('code');
    codeInput.addEventListener('input', function(e) {
        // Garder uniquement les chiffres
        let value = e.target.value.replace(/\D/g, '');

        // Limiter à 6 chiffres
        if (value.length > 6) {
            value = value.substring(0, 6);
        }

        e.target.value = value;

        // Valider automatiquement si 6 chiffres sont entrés
        if (value.length === 6) {
            document.getElementById('phoneOrEmail').focus();
        }
    });

    // Formatage du numéro de téléphone
    const phoneInput = document.getElementById('phoneOrEmail');
    phoneInput.addEventListener('input', function(e) {
        const value = e.target.value;

        // Si ça commence par +32, on formate automatiquement
        if (value.startsWith('+32') && value.length > 3) {
            let formatted = '+32' + value.substring(3).replace(/\D/g, '');
            if (formatted.length > 12) {
                formatted = formatted.substring(0, 12);
            }
            e.target.value = formatted;
        }
    });

    // Fonction pour afficher les alertes
    function showAlert(type, title, message) {
        // Supprimer les alertes existantes
        const existingAlert = document.querySelector('.alert');
        if (existingAlert) {
            existingAlert.remove();
        }

        const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
        const alertClass = type === 'success' ? 'alert-success' : 'alert-error';

        const alertDiv = document.createElement('div');
        alertDiv.className = `alert ${alertClass}`;
        alertDiv.innerHTML = `
            <div class="alert-icon">
                <i class="fas ${icon}"></i>
            </div>
            <div class="alert-content">
                <div class="alert-title">${title}</div>
                <div class="alert-message">${message}</div>
            </div>
        `;

        document.body.appendChild(alertDiv);

        // Supprimer l'alerte après 5 secondes
        setTimeout(() => {
            if (alertDiv.parentNode) {
                alertDiv.style.animation = 'slideInRight 0.3s ease-out reverse';
                setTimeout(() => {
                    if (alertDiv.parentNode) alertDiv.parentNode.removeChild(alertDiv);
                }, 300);
            }
        }, 5000);
    }

    // Soumission du formulaire
    document.getElementById('validationForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const phoneOrEmail = document.getElementById('phoneOrEmail').value.trim();
        const code = document.getElementById('code').value.trim();
        const validateBtn = document.getElementById('validateBtn');

        // Validation basique
        if (!phoneOrEmail) {
            showAlert('error', 'Champ manquant', 'Veuillez entrer votre numéro ou email');
            return;
        }

        if (!code || code.length !== 6) {
            showAlert('error', 'Code invalide', 'Le code doit contenir 6 chiffres');
            return;
        }

        // Désactiver le bouton pendant la requête
        validateBtn.disabled = true;
        validateBtn.innerHTML = `
            <div class="loading"></div>
            <span>Validation en cours...</span>
        `;

        try {
            const response = await fetch('/api/users/validate-account', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    phoneOrEmail: phoneOrEmail,
                    code: code
                })
            });

            const result = await response.json();

            if (response.ok && result.success) {
                showAlert('success', 'Succès !', result.message);

                // Redirection après succès
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 2000);

            } else {
                showAlert('error', 'Erreur', result.error || 'Une erreur est survenue');
                validateBtn.innerHTML = `
                    <i class="fas fa-check-circle"></i>
                    <span>Valider le compte</span>
                `;
                validateBtn.disabled = false;
            }

        } catch (error) {
            console.error('Erreur:', error);
            showAlert('error', 'Erreur réseau', 'Impossible de se connecter au serveur');
            validateBtn.innerHTML = `
                <i class="fas fa-check-circle"></i>
                <span>Valider le compte</span>
            `;
            validateBtn.disabled = false;
        }
    });

    // Focus sur le premier champ au chargement
    document.addEventListener('DOMContentLoaded', () => {
        // Vérifier s'il y a des données en localStorage
        const pendingUser = JSON.parse(localStorage.getItem('pendingValidation') || '{}');
        if (pendingUser.phoneNumber || pendingUser.email) {
            document.getElementById('phoneOrEmail').value = pendingUser.phoneNumber || pendingUser.email;
            document.getElementById('code').focus();
        } else {
            document.getElementById('phoneOrEmail').focus();
        }

        // Effacer les données de validation après chargement
        localStorage.removeItem('pendingValidation');
    });

    // Permettre la validation avec la touche Entrée
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.target.matches('button')) {
            e.preventDefault();
            const validateBtn = document.getElementById('validateBtn');
            if (!validateBtn.disabled) {
                validateBtn.click();
            }
        }
    });

    // Animation de focus pour les inputs
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.addEventListener('focus', function() {
            this.parentElement.style.transform = 'scale(1.01)';
        });

        input.addEventListener('blur', function() {
            this.parentElement.style.transform = 'scale(1)';
        });
    });
</script>
</body>
</html>
