<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Principal</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
           min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; position:relative;}
    .menu-container { background:white; border-radius:24px; box-shadow:0 20px 60px rgba(0,0,0,0.3);
                     overflow:hidden; width:100%; max-width:500px; position:relative; z-index:1;}
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding:50px 30px; text-align:center; color:white;}
    h1 { font-size:2.5rem; font-weight:700; margin-bottom:8px; letter-spacing:-0.5px;}
    .subtitle { font-size:1rem; opacity:0.9; font-weight:400;}
    .menu-content { padding:30px; }
    .menu { display:flex; flex-direction:column; gap:14px; margin-bottom:25px;}
    .menu button { padding:16px 20px; border:none; border-radius:14px; font-size:1.1rem; font-weight:600;
                   cursor:pointer; transition: all 0.3s; font-family:inherit; text-align:left; display:flex; align-items:center; gap:12px;
                   position:relative;}
    .menu button::before { content:attr(data-icon); font-size:1.3rem; }
    .menu button:not(:disabled) { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:white; box-shadow:0 4px 12px rgba(102,126,234,0.3);}
    .menu button:not(:disabled):hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(102,126,234,0.4);}
    .menu button:not(:disabled):active { transform:translateY(0);}

    /* Style spécial pour le bouton de suppression */
    .menu button.danger-btn:not(:disabled) {
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
      box-shadow:0 4px 12px rgba(255, 107, 107, 0.3);
    }
    .menu button.danger-btn:not(:disabled):hover {
      box-shadow:0 6px 20px rgba(255, 107, 107, 0.4);
    }

    /* Style pour bouton désactivé */
    .menu button:disabled {
      background: #e5e7eb;
      color: #9ca3af;
      cursor: not-allowed;
      box-shadow: none;
    }

    .divider { height:1px; background: linear-gradient(to right, transparent, #e5e7eb, transparent); margin:25px 0;}
    .output { background:#f8f9ff; border:2px solid #e5e7eb; border-radius:12px; padding:16px; text-align:center;
              color:#374151; font-size:0.95rem; font-weight:500; }
  </style>
</head>
<body>

<div class="menu-container">
  <div class="header">
    <h1>Menu Principal</h1>
    <p class="subtitle">Gérez votre espace</p>
  </div>

  <div class="menu-content">
    <div class="menu">
      <button id="btnProfil" data-icon="👤">Mon Profil</button>
      <button id="btnListeProfils" data-icon="👥">Liste des membres</button>

      <!-- NOUVEAU BOUTON : Parler avec ma team -->
      <button id="btnTeam" data-icon="💬">Parler avec ma team</button>

      <!-- NOUVEAU BOUTON : Afficher les PlayList -->
      <button id="btnAfficherPlaylists" data-icon="📋">Afficher les PlayList</button>

      <!-- BOUTON ACTIVÉ : Voir mes préférences musicales -->
      <button id="btnPreferencesMusicales" data-icon="🎶">
        Voir mes préférences musicales
      </button>

      <!-- NOUVEAU BOUTON : Remplissez vos goûts musicaux -->
      <button id="btnGoutsMusicaux" data-icon="✨">Remplissez vos goûts musicaux</button>

      <!-- NOUVEAU BOUTON : Ajouter un genre musical -->
      <button id="btnAjouterGenre" data-icon="➕">Ajouter un genre musical</button>

      <!-- NOUVEAU BOUTON : Point commun (ou pas ...) avec les autres -->
      <button id="btnPointCommun" data-icon="🔍">Point commun (ou pas ...) avec les autres</button>

      <!-- NOUVEAU BOUTON : Encode ton son de bienvenue -->
      <button id="btnSonBienvenue" data-icon="🎵">Encode ton son de bienvenue</button>

      <!-- NOUVEAU BOUTON : Effacer un user -->
      <button id="btnEffacerUser" data-icon="🗑️" class="danger-btn">Effacer un user</button>
    </div>

    <div class="divider"></div>

    <div class="menu">
      <button id="btnLogout" data-icon="🚪">Déconnexion</button>
    </div>

    <div class="output" id="output">Sélectionnez une option ci-dessus</div>
  </div>
</div>

<script>
  const output = document.getElementById("output");

  // Vérifier l'authentification
  const token = localStorage.getItem('accessToken');
  if (!token) {
    alert('Vous devez être connecté pour accéder au menu');
    window.location.href = '/connection/connection.html';
  }

  // Variable pour stocker l'ID de l'utilisateur courant
  let currentUserId = null;

  async function checkAuth() {
    try {
      const response = await fetch('/api/users/me', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!response.ok) throw new Error('Token invalide');

      const userData = await response.json();
      currentUserId = userData.id; // Stocker l'ID de l'utilisateur courant

      return userData;
    } catch (err) {
      localStorage.removeItem('accessToken');
      localStorage.removeItem('refreshToken');
      alert('Session expirée');
      window.location.href = '/connection/connection.html';
    }
  }

  // MODIFIÉ : Bouton Profil - Redirige vers profil.html avec l'ID utilisateur
  document.getElementById("btnProfil").addEventListener("click", async () => {
    output.textContent = "Chargement de votre profil...";

    try {
      // Si on n'a pas encore l'ID, on le récupère
      if (!currentUserId) {
        const userData = await checkAuth();
        currentUserId = userData.id;
      }

      if (currentUserId) {
        output.textContent = "Ouverture de votre profil...";
        // Redirection vers la page profil avec l'ID en paramètre
        setTimeout(() => {
          window.location.href = `/menu/profil.html?userId=${currentUserId}`;
        }, 300);
      } else {
        output.textContent = "Erreur: Impossible de récupérer votre ID";
      }
    } catch (err) {
      output.textContent = "Erreur réseau lors du chargement du profil";
      console.error('Erreur:', err);
    }
  });

  // Navigation autres boutons
  document.getElementById("btnListeProfils").addEventListener("click", ()=>{
    output.textContent="Ouverture de la liste des profils...";
    setTimeout(()=>{window.location.href="afficherUserList.html";},300);
  });

  // NOUVEAU : Bouton Parler avec ma team
  document.getElementById("btnTeam").addEventListener("click", ()=>{
    output.textContent="Ouverture de votre espace team...";
    setTimeout(()=>{window.location.href="ma_communaute/ma_communaute.html";},300);
  });

  // NOUVEAU BOUTON : Afficher les PlayList - Redirige vers afficher_playlist.html
  document.getElementById("btnAfficherPlaylists").addEventListener("click", ()=>{
    output.textContent="Ouverture de la liste des playlists...";
    setTimeout(()=>{window.location.href="playlist_menu/afficher_playlist.html";},300);
  });

  // MODIFIÉ : Bouton Voir mes préférences musicales - Redirige vers afficher_music_favoris.html
  document.getElementById("btnPreferencesMusicales").addEventListener("click", ()=>{
    output.textContent="Ouverture de vos préférences musicales...";
    setTimeout(()=>{window.location.href="afficher_music_favoris.html";},300);
  });

  // NOUVEAU : Bouton Remplissez vos goûts musicaux
  document.getElementById("btnGoutsMusicaux").addEventListener("click", ()=>{
    output.textContent="Ouverture du formulaire de goûts musicaux...";
    setTimeout(()=>{window.location.href="choix_gout_musicaux.html";},300);
  });

  // NOUVEAU BOUTON : Ajouter un genre musical
  document.getElementById("btnAjouterGenre").addEventListener("click", ()=>{
    output.textContent="Ouverture de l'ajout de genre musical...";
    setTimeout(()=>{window.location.href="ajouter_genre_musical.html";},300);
  });

  // NOUVEAU BOUTON : Point commun (ou pas ...) avec les autres
  document.getElementById("btnPointCommun").addEventListener("click", ()=>{
    output.textContent="Recherche des points communs musicaux...";
    setTimeout(()=>{window.location.href="style_music_users/style_music_users.html";},300);
  });

  // NOUVEAU BOUTON : Encode ton son de bienvenue
  document.getElementById("btnSonBienvenue").addEventListener("click", ()=>{
    output.textContent="Ouverture de l'encodeur de son...";
    setTimeout(()=>{window.location.href="menu_encodage_son.html";},300);
  });

  // NOUVEAU BOUTON : Effacer un user - Redirige vers suppression.html
  document.getElementById("btnEffacerUser").addEventListener("click", ()=>{
    output.textContent="Ouverture de la page de suppression d'utilisateur...";
    setTimeout(()=>{window.location.href="suppression.html";},300);
  });

  // 🔹 Bouton Déconnexion
  document.getElementById("btnLogout").addEventListener("click", async () => {
    const refreshToken = localStorage.getItem('refreshToken');
    if (!refreshToken) return;

    try {
      const response = await fetch('/api/auth/logout', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({ refreshToken })
      });
      if (response.ok) {
        localStorage.removeItem('accessToken');
        localStorage.removeItem('refreshToken');
        localStorage.removeItem('currentUserData');
        alert('Déconnexion réussie');
        window.location.href = '/connection/connection.html';
      } else {
        alert('Erreur lors de la déconnexion');
      }
    } catch (err) {
      alert('Erreur réseau lors de la déconnexion');
    }
  });

  // Initialisation - Récupérer l'ID utilisateur au chargement
  checkAuth();
</script>

</body>
</html>
