<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utilisateurs Opposés</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        min-height: 100vh;
        padding: 20px;
    }

    .main-container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        overflow: hidden;
        min-height: 90vh;
        display: flex;
        flex-direction: column;
    }

    .header {
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        padding: 25px 30px;
        color: white;
        text-align: center;
        border-bottom: 2px solid rgba(255,255,255,0.2);
    }

    .header h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 8px;
    }

    .header .subtitle {
        font-size: 0.95rem;
        opacity: 0.9;
    }

    /* Barre d'action avec les 3 boutons alignés */
    .action-buttons {
        display: flex;
        justify-content: center;
        padding: 15px 30px;
        background: #fffbeb;
        border-bottom: 2px solid #fef3c7;
        flex-wrap: wrap;
        gap: 10px;
    }

    .btn {
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        border: 2px solid transparent;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        flex: 1;
        min-width: 160px;
        white-space: nowrap;
    }

    .btn-menu {
        background: #d97706;
        color: white;
    }

    .btn-menu:hover {
        background: #b45309;
        transform: translateY(-2px);
    }

    .btn-prev {
        background: #f59e0b;
        color: white;
    }

    .btn-prev:hover {
        background: #d97706;
        transform: translateY(-2px);
    }

    .btn-logout {
        background: #374151;
        color: white;
        border: none;
        font-family: inherit;
    }

    .btn-logout:hover {
        background: #1f2937;
        transform: translateY(-2px);
    }

    .content {
        padding: 30px;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .message {
        padding: 16px;
        border-radius: 12px;
        margin-bottom: 20px;
        border: 2px solid;
        text-align: center;
        width: 100%;
        max-width: 800px;
    }

    .loading-message {
        background: #fffbeb;
        color: #92400e;
        border-color: #fef3c7;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .error-message {
        background: #fee;
        color: #dc2626;
        border-color: #fecaca;
        display: none;
    }

    .users-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 25px;
        width: 100%;
        max-width: 1200px;
    }

    /* Card épurée avec Photo Rectangulaire */
    .user-card {
        background: #fffbeb;
        border-radius: 16px;
        padding: 20px;
        border: 2px solid #fef3c7;
        transition: all 0.3s;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .user-card:hover {
        border-color: #f59e0b;
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(245, 158, 11, 0.15);
    }

    .user-avatar {
        width: 100%;
        aspect-ratio: 1 / 1;
        max-width: 180px;
        object-fit: cover;
        border-radius: 12px; /* Rectangle arrondi */
        border: 3px solid #f59e0b;
        margin-bottom: 15px;
    }

    .avatar-placeholder {
        width: 100%;
        aspect-ratio: 1 / 1;
        max-width: 180px;
        border-radius: 12px; /* Rectangle arrondi */
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        color: white;
        border: 3px solid #f59e0b;
        margin-bottom: 15px;
    }

    .user-name {
        font-weight: 700;
        font-size: 1.3rem;
        color: #374151;
        margin-bottom: 15px;
        word-break: break-word;
    }

    .profile-link {
        display: inline-block;
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
        color: white;
        text-align: center;
        border-radius: 10px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s;
    }

    .profile-link:hover {
        background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
    }

    .empty-state {
        text-align: center;
        padding: 40px 20px;
    }

    .refresh-btn {
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .loading-spinner {
        width: 20px;
        height: 20px;
        border: 3px solid rgba(146, 64, 14, 0.3);
        border-radius: 50%;
        border-top-color: #92400e;
        animation: spin 1s linear infinite;
    }

    @media (max-width: 768px) {
        .action-buttons { flex-direction: column; }
        .btn { width: 100%; }
        .users-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="main-container">
  <div class="header">
    <h1>⚠️ Goûts Opposés</h1>
    <p class="subtitle">Les utilisateurs avec des préférences musicales opposées aux vôtres</p>
  </div>

  <div class="action-buttons">
    <a href="/menu/menu.html" class="btn btn-menu">🏠 Retour au menu principal</a>
    <a href="/menu/connection_musical_menu.html" class="btn btn-prev">⬅️ Menu précédent</a>
    <button id="logoutBtn" class="btn btn-logout">🚪 Déconnexion</button>
  </div>

  <div class="content">
    <div class="message loading-message" id="loadingMessage">
      <div class="loading-spinner"></div> Recherche des opposés...
    </div>

    <div class="message error-message" id="errorMessage">
      ❌ <span id="errorText"></span>
    </div>

    <div class="users-grid" id="usersGrid"></div>

    <div class="empty-state" id="emptyState" style="display: none;">
      <p style="margin-bottom: 20px; color: #6b7280;">Aucun utilisateur opposé trouvé pour le moment.</p>
      <button class="refresh-btn" id="refreshBtn">🔄 Actualiser</button>
    </div>
  </div>

  <div class="footer" style="text-align: center; padding: 15px; color: #6b7280; font-size: 0.85rem; border-top: 2px solid #fef3c7; margin-top: auto;">
    <p>Goûts opposés • Mis à jour: <span id="lastUpdate">--:--</span></p>
  </div>
</div>

<script>
  const CONFIG = {
      apiBaseUrl: '/api/music-favoris',
      token: localStorage.getItem('accessToken')
  };

  const DOM = {
      loadingMessage: document.getElementById('loadingMessage'),
      errorMessage: document.getElementById('errorMessage'),
      errorText: document.getElementById('errorText'),
      usersGrid: document.getElementById('usersGrid'),
      emptyState: document.getElementById('emptyState'),
      refreshBtn: document.getElementById('refreshBtn'),
      logoutBtn: document.getElementById('logoutBtn'),
      lastUpdate: document.getElementById('lastUpdate')
  };

  class OppositeUsersManager {
      constructor() {
          this.oppositeUsers = [];
      }

      async init() {
          if (!CONFIG.token) {
              window.location.href = '/connection/connection.html';
              return;
          }
          this.setupEventListeners();
          await this.loadOppositeUsers();
          this.updateLastUpdateTime();
      }

      async loadOppositeUsers() {
          try {
              this.showLoading();
              const response = await fetch(`${CONFIG.apiBaseUrl}/me/opposite`, {
                  headers: { 'Authorization': 'Bearer ' + CONFIG.token }
              });

              if (response.status === 401) {
                  window.location.href = '/connection/connection.html';
                  return;
              }

              const data = await response.json();
              this.oppositeUsers = data.oppositeUsers || [];
              this.renderUsers();

          } catch (error) {
              this.handleError('Erreur de chargement', error);
          } finally {
              DOM.loadingMessage.style.display = 'none';
          }
      }

      renderUsers() {
          DOM.usersGrid.innerHTML = '';
          if (this.oppositeUsers.length === 0) {
              DOM.emptyState.style.display = 'block';
              return;
          }

          DOM.emptyState.style.display = 'none';
          this.oppositeUsers.forEach(user => {
              const card = document.createElement('div');
              card.className = 'user-card';

              let avatarHtml = user.photoUrl
                ? `<img src="${user.photoUrl}" class="user-avatar" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\"avatar-placeholder\">${(user.username || '?')[0].toUpperCase()}</div>';">`
                : `<div class="avatar-placeholder">${(user.username || '?')[0].toUpperCase()}</div>`;

              card.innerHTML = `
                  ${avatarHtml}
                  <div class="user-name">${this.escapeHtml(user.username || 'Utilisateur')}</div>
                  <a href="/menu/profil_user.html?userId=${user.id}" class="profile-link">👤 Voir le profil</a>
              `;
              DOM.usersGrid.appendChild(card);
          });
      }

      setupEventListeners() {
          DOM.logoutBtn.addEventListener('click', () => {
              localStorage.removeItem('accessToken');
              localStorage.removeItem('userData');
              window.location.href = '/connection/connection.html';
          });
          DOM.refreshBtn.addEventListener('click', () => this.loadOppositeUsers());
      }

      updateLastUpdateTime() {
          DOM.lastUpdate.textContent = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      }

      showLoading() {
          DOM.loadingMessage.style.display = 'flex';
          DOM.errorMessage.style.display = 'none';
          DOM.emptyState.style.display = 'none';
      }

      handleError(context, error) {
          DOM.errorText.textContent = `${context}: ${error.message}`;
          DOM.errorMessage.style.display = 'block';
      }

      escapeHtml(text) {
          const div = document.createElement('div');
          div.textContent = text;
          return div.innerHTML;
      }
  }

  document.addEventListener('DOMContentLoaded', () => {
      new OppositeUsersManager().init();
  });
</script>
</body>
</html>
