<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utilisateurs Similaires</title>
  <style>
    /* Reset et styles de base */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        min-height: 90vh;
        display: flex;
        flex-direction: column;
    }

    /* En-tête */
    .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 30px;
        color: white;
        text-align: center;
    }

    .header h1 { font-size: 2rem; margin-bottom: 10px; }

    /* Barre d'action avec les 3 boutons alignés */
    .action-buttons {
        display: flex;
        justify-content: center;
        padding: 20px;
        background: #f8f9ff;
        border-bottom: 2px solid #e5e7eb;
        flex-wrap: wrap;
        gap: 10px;
    }

    .btn {
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        flex: 1;
        min-width: 160px;
        white-space: nowrap;
    }

    .btn-main { background: #667eea; color: white; }
    .btn-prev { background: #764ba2; color: white; }
    .btn-logout { background: #ef4444; color: white; }

    .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

    /* Contenu */
    .main-content { padding: 30px; flex: 1; }

    .stats-section {
        background: #f0f9ff;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 30px;
        border: 2px solid #bae6fd;
        text-align: center;
    }

    .stats-number { font-size: 2rem; font-weight: 700; color: #0369a1; }

    /* Grille et Cartes */
    .users-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 25px;
    }

    .user-card {
        background: white;
        border-radius: 15px;
        padding: 20px;
        border: 2px solid #e5e7eb;
        transition: all 0.3s;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .user-card:hover {
        border-color: #667eea;
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.15);
    }

    /* Photo Rectangulaire */
    .user-photo-container {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 12px;
        margin-bottom: 15px;
        overflow: hidden;
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
    }

    .user-photo-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .photo-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        color: white;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .user-name {
        font-size: 1.25rem;
        font-weight: 700;
        color: #1f2937;
        margin-bottom: 20px;
        word-break: break-word;
    }

    .btn-profile {
        background: #10b981;
        color: white;
        padding: 12px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        width: 100%;
        transition: 0.3s;
    }

    /* Utilitaires */
    .message { padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; text-align: center; }
    .loading-message { background: #e0f2fe; color: #0369a1; }
    .error-message { background: #fee; color: #dc2626; }
    .empty-state { text-align: center; padding: 40px; grid-column: 1 / -1; }

    @media (max-width: 768px) {
        .action-buttons { flex-direction: column; }
        .btn { width: 100%; }
        .users-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎵 Utilisateurs Similaires</h1>
    <p>Découvrez les personnes qui partagent vos goûts musicaux</p>
  </div>

  <div class="action-buttons">
    <a href="/menu/menu.html" class="btn btn-main">🏠 Retour au menu principal</a>
    <a href="/menu/connection_musical_menu.html" class="btn btn-prev">⬅️ Menu précédent</a>
    <button id="logoutBtn" class="btn btn-logout">🚪 Déconnexion</button>
  </div>

  <div class="message error-message" id="errorMessage"></div>
  <div class="message loading-message" id="loadingMessage">Recherche en cours...</div>

  <div class="main-content" id="mainContent">
    <div class="stats-section" id="statsSection">
      <div class="stats-number" id="usersCount">0</div>
      <div id="statsText">Personnes partagent vos goûts</div>
    </div>

    <div class="users-grid" id="usersGrid"></div>

    <div class="empty-state" id="emptyState" style="display:none;">
      <p>Aucun utilisateur trouvé pour le moment.</p>
      <button onclick="location.reload()" style="margin-top:15px; cursor:pointer; padding:10px 20px; border-radius:8px; border:none; background:#667eea; color:white;">🔄 Actualiser</button>
    </div>
  </div>

  <div class="footer" style="text-align:center; padding:20px; color:#6b7280; border-top:1px solid #eee;">
    <p>© 2024 Music Social</p>
  </div>
</div>

<script>
  const CONFIG = {
      apiBaseUrl: '/api/music-favoris',
      token: localStorage.getItem('accessToken')
  };

  const DOM = {
      errorMessage: document.getElementById('errorMessage'),
      loadingMessage: document.getElementById('loadingMessage'),
      usersCount: document.getElementById('usersCount'),
      usersGrid: document.getElementById('usersGrid'),
      emptyState: document.getElementById('emptyState'),
      logoutBtn: document.getElementById('logoutBtn')
  };

  class SimilarUsersManager {
      constructor() {
          this.init();
      }

      async init() {
          if (!CONFIG.token) {
              window.location.href = '/connection/connection.html';
              return;
          }
          this.setupEventListeners();
          await this.loadSimilarUsers();
      }

      setupEventListeners() {
          DOM.logoutBtn.addEventListener('click', () => {
              localStorage.removeItem('accessToken');
              localStorage.removeItem('userData');
              window.location.href = '/connection/connection.html';
          });
      }

      async loadSimilarUsers() {
          try {
              DOM.loadingMessage.style.display = 'block';
              const response = await fetch(`${CONFIG.apiBaseUrl}/me/similar-users`, {
                  headers: { 'Authorization': `Bearer ${CONFIG.token}` }
              });

              if (!response.ok) throw new Error('Erreur lors de la récupération');

              const data = await response.json();
              DOM.loadingMessage.style.display = 'none';

              if (data.users && data.users.length > 0) {
                  this.renderUsers(data.users, data.count);
              } else {
                  DOM.emptyState.style.display = 'block';
              }
          } catch (error) {
              DOM.loadingMessage.style.display = 'none';
              DOM.errorMessage.textContent = error.message;
              DOM.errorMessage.style.display = 'block';
          }
      }

      renderUsers(users, count) {
          DOM.usersCount.textContent = count;
          DOM.usersGrid.innerHTML = '';
          users.forEach(user => {
              const card = document.createElement('div');
              card.className = 'user-card';

              const photoContent = user.photoUrl
                  ? `<img src="${user.photoUrl}" alt="${user.username}" onerror="this.parentElement.innerHTML='<div class=\"photo-placeholder\">${user.username.charAt(0)}</div>'">`
                  : `<div class="photo-placeholder">${user.username ? user.username.charAt(0).toUpperCase() : '?'}</div>`;

              card.innerHTML = `
                  <div class="user-photo-container">${photoContent}</div>
                  <div class="user-name">${this.escapeHtml(user.username)}</div>
                  <a href="/menu/profil_user.html?userId=${user.id}" class="btn-profile">👤 Voir le profil</a>
              `;
              DOM.usersGrid.appendChild(card);
          });
      }

      escapeHtml(text) {
          const div = document.createElement('div');
          div.textContent = text;
          return div.innerHTML;
      }
  }

  document.addEventListener('DOMContentLoaded', () => new SimilarUsersManager());
</script>
</body>
</html>
