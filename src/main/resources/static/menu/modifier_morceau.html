<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Modifier un Morceau — Moteka</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
        --sp: #1DB954;
        --sp2: #1ed760;
        --bg: #060606;
        --card-bg: #121212;
        --text: #ffffff;
        --muted: #a7a7a7;
        --border: rgba(255,255,255,0.08);
        --nav-h: 70px;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Syne', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        padding-top: var(--nav-h);
        min-height: 100vh;
    }

    /* Navigation */
    .fixed-nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--nav-h);
        z-index: 1000;
        background: rgba(6,6,6,0.95);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
    }

    .nav-title {
        font-size: 1.2rem;
        font-weight: 800;
        color: var(--sp);
    }

    .nav-menu-btn {
        height: 44px;
        background: var(--sp);
        color: black;
        padding: 0 24px;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    /* Conteneur principal */
    .container {
        max-width: 700px;
        margin: 0 auto;
        padding: 30px 20px;
    }

    /* Carte principale */
    .main-card {
        background: var(--card-bg);
        border-radius: 24px;
        border: 1px solid var(--border);
        overflow: hidden;
        padding: 30px;
    }

    .main-card h2 {
        font-size: 1.5rem;
        font-weight: 800;
        margin-bottom: 8px;
        text-align: center;
    }

    .main-card p {
        color: var(--muted);
        font-size: 0.85rem;
        text-align: center;
        margin-bottom: 30px;
    }

    /* Groupes de formulaire */
    .form-group {
        margin-bottom: 25px;
    }

    .form-label {
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
    }

    .form-label i {
        color: var(--sp);
        font-size: 0.9rem;
    }

    .search-row {
        display: flex;
        gap: 12px;
        margin-bottom: 15px;
    }

    .search-input {
        flex: 1;
        background: #0a0a0a;
        border: 1px solid var(--border);
        border-radius: 30px;
        padding: 14px 20px;
        color: white;
        font-size: 0.95rem;
        font-family: 'Syne', sans-serif;
        outline: none;
        transition: border-color 0.2s;
    }

    .search-input:focus {
        border-color: var(--sp);
    }

    /* Double colonne pour genre et note */
    .double-col {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
    }

    .double-col .form-group {
        flex: 1;
        min-width: 150px;
    }

    select {
        width: 100%;
        background: #0a0a0a;
        border: 1px solid var(--border);
        border-radius: 30px;
        padding: 14px 20px;
        color: white;
        font-size: 0.95rem;
        font-family: 'Syne', sans-serif;
        outline: none;
        cursor: pointer;
        transition: border-color 0.2s;
    }

    select:focus {
        border-color: var(--sp);
    }

    select option {
        background: #0a0a0a;
        color: white;
    }

    input[type="number"] {
        width: 100%;
        background: #0a0a0a;
        border: 1px solid var(--border);
        border-radius: 30px;
        padding: 14px 20px;
        color: white;
        font-size: 0.95rem;
        font-family: 'Syne', sans-serif;
        outline: none;
        transition: border-color 0.2s;
    }

    input[type="number"]:focus {
        border-color: var(--sp);
    }

    .readonly-field {
        background: #0a0a0a;
        border: 1px solid var(--border);
        border-radius: 30px;
        padding: 14px 20px;
        width: 100%;
        color: var(--muted);
        font-size: 0.9rem;
        font-family: 'DM Mono', monospace;
        outline: none;
        cursor: text;
        word-break: break-all;
    }

    .btn {
        padding: 14px 24px;
        border-radius: 30px;
        font-weight: 800;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-family: 'Syne', sans-serif;
        white-space: nowrap;
    }

    .btn-youtube {
        background: #FF0000;
        color: white;
    }

    .btn-youtube:hover {
        background: #ff3333;
        transform: scale(1.02);
    }

    .btn-secondary {
        background: #2a2a2a;
        color: white;
        border: 1px solid var(--border);
    }

    .btn-secondary:hover {
        background: #3a3a3a;
        transform: scale(1.02);
    }

    .btn-validate {
        width: 100%;
        background: var(--sp);
        color: black;
        justify-content: center;
        padding: 16px;
        font-size: 1rem;
        margin-top: 10px;
    }

    .btn-validate:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }

    .btn-cancel {
        width: 100%;
        background: #555;
        color: white;
        justify-content: center;
        padding: 14px;
        font-size: 0.95rem;
        margin-top: 12px;
        border: 1px solid #777;
    }

    .btn-cancel:hover {
        background: #666;
        transform: scale(1.02);
    }

    .btn-view {
        width: 100%;
        background: var(--sp);
        color: black;
        justify-content: center;
        padding: 14px;
        font-size: 0.95rem;
        margin-top: 15px;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .btn-view:hover {
        background: var(--sp2);
        transform: scale(1.02);
    }

    .action-row {
        display: flex;
        gap: 12px;
        margin: 15px 0;
        flex-wrap: wrap;
    }

    .action-row .btn {
        flex: 1;
        justify-content: center;
    }

    .result-card {
        margin-top: 25px;
        padding: 20px;
        background: #0a0a0a;
        border-radius: 16px;
        border: 1px solid var(--border);
        display: none;
    }

    .result-card.show {
        display: block;
    }

    .result-title {
        font-weight: 800;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .result-title i {
        color: var(--sp);
    }

    .result-content {
        font-family: 'DM Mono', monospace;
        font-size: 0.8rem;
        color: var(--muted);
        word-break: break-all;
        line-height: 1.5;
    }

    .success-message {
        color: var(--sp);
    }

    .error-message {
        color: #ff5555;
    }

    .loader {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255,255,255,0.2);
        border-top-color: var(--sp);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-left: 8px;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--sp);
        color: black;
        padding: 12px 30px;
        border-radius: 50px;
        font-weight: 800;
        font-size: 0.9rem;
        z-index: 9999;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        white-space: nowrap;
    }

    .toast.show {
        opacity: 1;
    }

    /* Responsive */
    @media (max-width: 600px) {
        :root {
            --nav-h: 60px;
        }

        .fixed-nav {
            padding: 0 20px;
        }

        .nav-title {
            font-size: 1rem;
        }

        .nav-menu-btn {
            padding: 0 16px;
            font-size: 0.8rem;
        }

        .nav-menu-btn span {
            display: none;
        }

        .nav-menu-btn i {
            font-size: 1rem;
        }

        .container {
            padding: 20px 16px;
        }

        .main-card {
            padding: 20px;
        }

        .main-card h2 {
            font-size: 1.3rem;
        }

        .search-row {
            flex-direction: column;
        }

        .search-row .btn {
            width: 100%;
            justify-content: center;
        }

        .action-row {
            flex-direction: column;
        }

        .action-row .btn {
            width: 100%;
        }

        .double-col {
            flex-direction: column;
            gap: 15px;
        }

        .double-col .form-group {
            width: 100%;
        }

        .btn {
            padding: 12px 20px;
        }

        .readonly-field, .search-input, select, input[type="number"] {
            padding: 12px 16px;
            font-size: 0.85rem;
        }
    }

    @media (max-width: 380px) {
        .main-card {
            padding: 16px;
        }

        .form-label {
            font-size: 0.8rem;
        }

        .btn {
            font-size: 0.85rem;
        }
    }
  </style>
</head>
<body>
<nav class="fixed-nav">
  <div class="nav-title">🎵 MODIFIER UN MORCEAU</div>
  <a href="menu.html" class="nav-menu-btn">
    <i class="fa fa-arrow-left"></i> <span>MENU</span>
  </a>
</nav>

<div class="container">
  <div class="main-card">
    <h2>✏️ Modification du morceau</h2>
    <p>Modifiez les informations et validez</p>

    <!-- Titre -->
    <div class="form-group">
      <div class="form-label">
        <i class="fa fa-music"></i> Titre du morceau
      </div>
      <div class="search-row">
        <input type="text" id="titreInput" class="search-input" placeholder="Titre du morceau...">
        <button class="btn btn-youtube" id="searchYoutubeBtn">
          <i class="fab fa-youtube"></i> Rechercher
        </button>
      </div>
    </div>

    <!-- Lien YouTube -->
    <div class="form-group">
      <div class="form-label">
        <i class="fab fa-youtube"></i> Lien YouTube
      </div>
      <input type="text" id="youtubeLink" class="readonly-field" readonly placeholder="Collez le lien YouTube ici...">
      <div class="action-row">
        <button class="btn btn-secondary" id="pasteBtn">
          <i class="fas fa-clipboard"></i> Coller
        </button>
      </div>
      <div class="form-label" style="margin-top: 8px; font-size: 0.7rem;">
        <i class="fa fa-info-circle"></i> Copiez un lien YouTube depuis votre navigateur, puis cliquez sur "Coller"
      </div>
    </div>

    <!-- Genre musical et Note - Double colonne -->
    <div class="double-col">
      <div class="form-group">
        <div class="form-label">
          <i class="fa fa-tag"></i> Genre musical
        </div>
        <select id="genreSelect">
          <option value="">-- Sélectionner un genre --</option>
        </select>
      </div>

      <div class="form-group">
        <div class="form-label">
          <i class="fa fa-star"></i> Note (0-10)
        </div>
        <input type="number" id="noteInput" min="0" max="10" step="1" placeholder="Note de 0 à 10">
      </div>
    </div>

    <!-- Boutons -->
    <button class="btn btn-validate" id="validateBtn">
      <i class="fas fa-check-circle"></i> Valider et modifier
    </button>
    <button class="btn btn-cancel" id="cancelBtn">
      <i class="fas fa-times"></i> Annuler
    </button>

    <!-- Zone de résultat -->
    <div id="resultCard" class="result-card">
      <div class="result-title">
        <i class="fa fa-spotify"></i> Résultat
      </div>
      <div id="resultContent" class="result-content"></div>
    </div>
  </div>
</div>

<div id="toast" class="toast">Lien copié !</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const musicId = urlParams.get('musicId');

  let currentMusic = null;
  let genresList = [];
  let spotifySearchResult = null;

  // Charger les genres musicaux
  async function loadGenres() {
      try {
          const response = await fetch('/api/music-genres');
          const genres = await response.json();
          genresList = genres;

          const select = document.getElementById('genreSelect');
          select.innerHTML = '<option value="">-- Sélectionner un genre --</option>';

          genres.forEach(genre => {
              const option = document.createElement('option');
              option.value = genre.id;
              option.textContent = genre.description;
              select.appendChild(option);
          });
      } catch (error) {
          console.error('Erreur lors du chargement des genres:', error);
          const select = document.getElementById('genreSelect');
          select.innerHTML = '<option value="">Erreur de chargement</option>';
      }
  }

  // Charger les informations actuelles de la musique
  async function loadMusic() {
      if (!musicId) {
          showToast('❌ ID de musique manquant', true);
          return false;
      }

      try {
          const response = await fetch(`/api/music/${musicId}`);
          const data = await response.json();

          if (data.success === false) {
              throw new Error(data.error || 'Erreur de chargement');
          }

          currentMusic = data;

          // Remplir les champs
          document.getElementById('titreInput').value = data.titre || '';
          document.getElementById('youtubeLink').value = data.lienYoutube || '';
          document.getElementById('noteInput').value = data.note || 0;

          // Sélectionner le genre si présent
          if (data.genreMusical && genresList.length > 0) {
              const genreFound = genresList.find(g => g.description === data.genreMusical);
              if (genreFound) {
                  document.getElementById('genreSelect').value = genreFound.id;
              }
          }

          return true;
      } catch (error) {
          console.error('Erreur chargement musique:', error);
          showToast(`❌ ${error.message}`, true);
          return false;
      }
  }

  // Rechercher le morceau sur Spotify à partir du titre
  async function searchSpotifyTrack(titre) {
      try {
          const res = await fetch(`/api/spotify/artiste/searchTrack?titre=${encodeURIComponent(titre)}`);
          const data = await res.json();

          if (data.success && data.resultats && data.resultats.length > 0) {
              const firstTrack = data.resultats[0];
              return {
                  success: true,
                  spotifyUrl: firstTrack.spotifyUrl,
                  titre: firstTrack.titre,
                  artiste: firstTrack.artiste,
                  photoUrl: firstTrack.photoUrl
              };
          } else {
              return { success: false, error: 'Aucun morceau trouvé sur Spotify' };
          }
      } catch (e) {
          return { success: false, error: e.message };
      }
  }

  // Récupérer la popularité d'un morceau Spotify
  async function getTrackPopularity(spotifyUrl) {
      try {
          const res = await fetch(`/api/spotify/track/popularity?url=${encodeURIComponent(spotifyUrl)}`);
          const data = await res.json();
          if (data.success) {
              return data.popularite || 0;
          }
          return 0;
      } catch (e) {
          console.error('Erreur récupération popularité:', e);
          return 0;
      }
  }

  // Mettre à jour la musique via PUT
  async function updateMusic(updatedData) {
      try {
          const response = await fetch(`/api/music/${musicId}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(updatedData)
          });
          const data = await response.json();
          return data;
      } catch (e) {
          return { success: false, error: e.message };
      }
  }

  // Afficher le résultat
  function showResult(success, message, details = null) {
      const resultCard = document.getElementById('resultCard');
      const resultContent = document.getElementById('resultContent');

      let html = '';

      if (success) {
          html = `
              <div class="success-message">
                  <strong>✅ ${message}</strong>
              </div>
              ${details ? `<div style="margin-top: 10px;">${details}</div>` : ''}
              <div style="margin-top: 15px;">
                  <a href="/menu/voir_morceau_encoder.html?musicId=${musicId}" class="btn-view" style="display: inline-block; text-align: center; text-decoration: none;">
                      <i class="fas fa-eye"></i> Voir le morceau
                  </a>
              </div>
          `;
      } else {
          html = `
              <div class="error-message">
                  <strong>❌ ${message}</strong>
              </div>
          `;
      }

      resultContent.innerHTML = html;
      resultCard.classList.add('show');
  }

  // Fonction principale de validation
  async function validateAndUpdate() {
      const titre = document.getElementById('titreInput').value.trim();
      const youtubeUrl = document.getElementById('youtubeLink').value.trim();
      const validateBtn = document.getElementById('validateBtn');

      // Récupérer le genre et la note
      const selectedGenreId = document.getElementById('genreSelect').value;
      const selectedGenreName = selectedGenreId ? genresList.find(g => g.id == selectedGenreId)?.description || "" : "";

      let noteInput = document.getElementById('noteInput').value;
      let note = noteInput !== "" ? parseInt(noteInput) : 0;
      if (isNaN(note)) note = 0;
      if (note < 0) note = 0;
      if (note > 10) note = 10;

      if (!titre) {
          showToast('❌ Veuillez entrer un titre de morceau', true);
          return;
      }

      if (!youtubeUrl) {
          showToast('❌ Veuillez coller un lien YouTube', true);
          return;
      }

      // Désactiver le bouton pendant le traitement
      validateBtn.disabled = true;
      validateBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Recherche Spotify...';

      try {
          // 1. Rechercher le morceau sur Spotify à partir du titre
          const spotifyResult = await searchSpotifyTrack(titre);

          if (!spotifyResult.success) {
              showToast(`❌ ${spotifyResult.error}`, true);
              showResult(false, spotifyResult.error);
              validateBtn.disabled = false;
              validateBtn.innerHTML = '<i class="fas fa-check-circle"></i> Valider et modifier';
              return;
          }

          validateBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Récupération popularité...';

          // 2. Récupérer la popularité
          const popularity = await getTrackPopularity(spotifyResult.spotifyUrl);

          validateBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Mise à jour...';

          // 3. Préparer les données pour la mise à jour
          const updateData = {
              titre: spotifyResult.titre,
              lienSpotify: spotifyResult.spotifyUrl,
              lienYoutube: youtubeUrl,
              urlImageSpotify: spotifyResult.photoUrl,
              popularite: popularity,
              genreMusical: selectedGenreName,
              note: note
          };

          // 4. Envoyer la mise à jour
          const updateResult = await updateMusic(updateData);

          if (updateResult.success) {
              showToast('✅ Morceau modifié avec succès !');
              showResult(true, 'Modification réussie !', `
                  <strong>Titre:</strong> ${spotifyResult.titre}<br>
                  <strong>Artiste:</strong> ${spotifyResult.artiste}<br>
                  ${selectedGenreName ? `<strong>Genre:</strong> ${selectedGenreName}<br>` : ''}
                  ${note !== 0 ? `<strong>Note:</strong> ${note}/10<br>` : ''}
                  <strong>Popularité Spotify:</strong> ${popularity}%
              `);
          } else {
              showToast(`❌ ${updateResult.error || 'Échec de la modification'}`, true);
              showResult(false, updateResult.error || 'Échec de la modification');
          }

      } catch (error) {
          console.error('Erreur:', error);
          showToast(`❌ Erreur: ${error.message}`, true);
          showResult(false, error.message);
      } finally {
          validateBtn.disabled = false;
          validateBtn.innerHTML = '<i class="fas fa-check-circle"></i> Valider et modifier';
      }
  }

  // Ouvrir la recherche YouTube
  function openYoutubeSearch() {
      let query = document.getElementById('titreInput').value.trim();
      if (!query) {
          showToast('❌ Entrez un titre de morceau', true);
          return;
      }
      const searchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
      window.open(searchUrl, '_blank');
      showToast('🔍 Recherche YouTube ouverte');
  }

  // Copier le presse-papier
  async function pasteFromClipboard() {
      try {
          const text = await navigator.clipboard.readText();
          const youtubeInput = document.getElementById('youtubeLink');
          youtubeInput.value = text;
          showToast('✅ Lien collé !');
      } catch (e) {
          showToast('❌ Autorisez le presse-papier dans le navigateur', true);
      }
  }

  // Annuler et retourner au menu
  function cancelEdit() {
      if (confirm("Annuler les modifications ?")) {
          window.location.href = '/menu/menu.html';
      }
  }

  function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.background = isError ? '#e91429' : 'var(--sp)';
      toast.style.color = 'white';
      toast.classList.add('show');
      setTimeout(() => {
          toast.classList.remove('show');
          toast.style.background = 'var(--sp)';
          toast.style.color = 'black';
      }, 3000);
  }

  // Initialisation
  document.addEventListener('DOMContentLoaded', async () => {
      // Charger les genres
      await loadGenres();

      // Charger la musique
      const loaded = await loadMusic();

      if (!loaded) {
          showResult(false, 'Impossible de charger le morceau. Vérifiez que l\'ID est correct.');
          document.getElementById('validateBtn').disabled = true;
      }

      // Événements
      document.getElementById('searchYoutubeBtn').addEventListener('click', openYoutubeSearch);
      document.getElementById('pasteBtn').addEventListener('click', pasteFromClipboard);
      document.getElementById('validateBtn').addEventListener('click', validateAndUpdate);
      document.getElementById('cancelBtn').addEventListener('click', cancelEdit);
  });
</script>
</body>
</html>
