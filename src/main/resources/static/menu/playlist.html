<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        body{
          font-family:Arial,sans-serif;
          background:#9b59b6;
          padding:20px;
          display:flex;
          flex-direction:column;
          align-items:center;
          min-height:100vh;
        }

        .buttons-container{
          position:fixed;
          top:20px;
          right:20px;
          display:flex;
          gap:10px;
          background:rgba(255,255,255,.95);
          padding:10px 15px;
          border-radius:15px;
          box-shadow:0 4px 20px rgba(0,0,0,.3);
          z-index:1000;
        }

        .buttons-container button{
          background:#fff;
          color:#8e44ad;
          border:2px solid #8e44ad;
          padding:10px 16px;
          border-radius:12px;
          font-weight:600;
          cursor:pointer;
          transition:.3s;
        }

        .buttons-container button:hover{
          background:#8e44ad;
          color:#fff;
        }

        h1{
          margin:80px 0 15px;
          color:#fff;
          text-align:center;
        }

        .playlist-info{
          color:#fff;
          margin-bottom:20px;
          text-align:center;
        }

        .container{
          display:grid;
          grid-template-columns:repeat(auto-fill,minmax(350px,1fr));
          gap:20px;
          width:100%;
          max-width:1200px;
        }

        .card{
          background:#fff;
          border-radius:16px;
          box-shadow:0 6px 20px rgba(0,0,0,.15);
          padding:20px;
          display:flex;
          flex-direction:column;
          transition:.3s;
        }

        .card:hover{
          transform:translateY(-6px);
        }

        iframe.youtube{
          width:100%;
          height:200px;
          border-radius:12px;
          border:none;
        }

        iframe.spotify{
          width:100%;
          height:80px;
          border-radius:8px;
          border:none;
          margin-top:10px;
        }

        .info{
          display:flex;
          justify-content:space-between;
          align-items:center;
          margin-top:12px;
          gap:10px;
        }

        .title{
          font-weight:bold;
          color:#222;
          flex: 1;
        }

        .info img{
          width:60px;
          height:60px;
          border-radius:8px;
          object-fit:cover;
        }

        /* BOUTON DÉCOUVRIR ARTISTE */
        .btn-discover {
            margin-top: 15px;
            background: #8e44ad;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }
        .btn-discover:hover { background: #732d91; }

        /* POPUP DESIGN */
        #artistPopup {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 2000; align-items: center; justify-content: center;
        }
        .popup-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .artist-list { margin: 20px 0; max-height: 350px; overflow-y: auto; }

        .artist-btn-link {
            display: flex; align-items: center; gap: 15px; background: #f9f9f9;
            padding: 10px; border-radius: 12px; margin-bottom: 10px;
            text-decoration: none; color: #333; border: 1px solid #eee; transition: 0.2s;
        }
        .artist-btn-link:hover { border-color: #8e44ad; background: #f0e6f5; }
        .artist-photo-rect { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; }
        .artist-name-popup { font-weight: bold; flex: 1; text-align: left; }

        .btn-close-popup { background: #eee; color: #555; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        .pagination{
          margin:30px 0;
          display:flex;
          gap:8px;
          flex-wrap:wrap;
          justify-content:center;
        }

        .pagination button{
          padding:8px 14px;
          border:none;
          border-radius:8px;
          background:#fff;
          color:#8e44ad;
          font-weight:600;
          cursor:pointer;
        }

        .pagination button.active,
        .pagination button:hover{
          background:#8e44ad;
          color:#fff;
        }

        .loading{ color:#fff; margin:30px; }
        .error{ background:#fff; color:#e74c3c; padding:20px; border-radius:10px; margin:30px; }
    </style>
</head>
<body>

<div class="buttons-container">
    <button onclick="history.back()">🔙 Retour</button>
    <button onclick="logout()">🚪 Déconnexion</button>
</div>

<h1 id="pageTitle">🎵 Playlist</h1>
<div class="playlist-info" id="playlistInfo"></div>
<div class="loading" id="loading">Chargement...</div>
<div class="container" id="playlist"></div>
<div class="pagination" id="pagination"></div>

<div id="artistPopup">
    <div class="popup-content">
        <h2 style="color:#8e44ad">Artistes</h2>
        <div id="artistListContent" class="artist-list"></div>
        <button class="btn-close-popup" onclick="closePopup()">Fermer</button>
    </div>
</div>

<script>
    const OWNER = "djhustla";
    const REPO = "music-storage";
    const BRANCH = "main";
    const FOLDER = "playlist_list";

    let allSongs = [];
    let currentPage = 1;
    const itemsPerPage = 20;

    function logout(){
      localStorage.removeItem("accessToken");
      localStorage.removeItem("refreshToken");
      window.location.href="/connection/connection.html";
    }

    async function loadPlaylist(){
      const params = new URLSearchParams(window.location.search);
      let src = decodeURIComponent(params.get("src") || "fr.txt");
      const playlistName = src.replace(".txt","");
      document.getElementById("pageTitle").textContent="🎵 "+playlistName;
      document.getElementById("playlistInfo").textContent="Lecture : "+playlistName;

      try{
        const apiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER}/${src}?ref=${BRANCH}`;
        const response = await fetch(apiUrl);
        if(!response.ok) throw new Error("Fichier introuvable");
        const data = await response.json();
        const decoded = atob(data.content);

        allSongs = decoded.trim().split("\n")
          .map(line=>{ try{ return JSON.parse(line); }catch{ return null; }})
          .filter(Boolean);

        document.getElementById("loading").style.display="none";
        renderPage(currentPage);
        renderPagination();
      }catch(err){
        document.getElementById("loading").style.display="none";
        document.getElementById("playlist").innerHTML=`<div class="error">${err.message}</div>`;
      }
    }

    function renderPage(page){
      const container=document.getElementById("playlist");
      container.innerHTML="";
      const start=(page-1)*itemsPerPage;
      const end=start+itemsPerPage;

      allSongs.slice(start,end).forEach(music=>{
        const card=document.createElement("div");
        card.className="card";
        let html="";

        if(music.youtubeUrl){
          const id=new URL(music.youtubeUrl).searchParams.get("v");
          if(id) html+=`<iframe class="youtube" src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
        }

        if(music.spotifyUrl){
          const embed=music.spotifyUrl.replace("track/","embed/track/");
          html+=`<iframe class="spotify" src="${embed}"></iframe>`;
        }

        html+=`
        <div class="info">
          <div class="title">${music.titreComplet || "Sans titre"}</div>
          ${music.photo ? `<img src="${music.photo}">` : ""}
        </div>`;

        // AJOUT DU BOUTON ARTISTE SI URL SPOTIFY PRÉSENTE
        if(music.spotifyUrl){
            html += `<button class="btn-discover" onclick="fetchArtists('${music.spotifyUrl}')">
                        <i class="fa-solid fa-users"></i> Voir Artistes
                     </button>`;
        }

        card.innerHTML=html;
        container.appendChild(card);
      });
    }

    // FONCTION POUR RÉCUPÉRER LES ARTISTES DEPUIS TON API
    async function fetchArtists(trackUrl) {
        const listContainer = document.getElementById('artistListContent');
        listContainer.innerHTML = '<div style="color:#8e44ad">Chargement...</div>';
        document.getElementById('artistPopup').style.display = 'flex';

        try {
            const res = await fetch(`/api/spotify/track/artists?url=${encodeURIComponent(trackUrl)}`);
            const data = await res.json();
            if (data.success && data.artists) {
                listContainer.innerHTML = '';
                data.artists.forEach(art => {
                    const btn = document.createElement('a');
                    btn.className = 'artist-btn-link';
                    btn.href = `/menu/artiste_spotify_detail.html?lienSpotify=${encodeURIComponent(art.url)}`;
                    btn.innerHTML = `
                        <img src="${art.photoUrl || 'https://via.placeholder.com/150'}" class="artist-photo-rect">
                        <div class="artist-name-popup">${art.nom}</div>
                        <i class="fa fa-chevron-right" style="color:#8e44ad"></i>
                    `;
                    listContainer.appendChild(btn);
                });
            } else { listContainer.innerHTML = "Aucun artiste trouvé."; }
        } catch (e) { listContainer.innerHTML = "Erreur serveur."; }
    }

    function renderPagination(){
      const pagination=document.getElementById("pagination");
      pagination.innerHTML="";
      const total=Math.ceil(allSongs.length/itemsPerPage);
      for(let i=1;i<=total;i++){
        const btn=document.createElement("button");
        btn.textContent=i;
        if(i===currentPage) btn.classList.add("active");
        btn.onclick=()=>{
          currentPage=i;
          renderPage(i);
          renderPagination();
          window.scrollTo({top:0,behavior:"smooth"});
        };
        pagination.appendChild(btn);
      }
    }

    function closePopup() { document.getElementById('artistPopup').style.display = 'none'; }
    window.addEventListener("DOMContentLoaded",loadPlaylist);
</script>

</body>
</html>
