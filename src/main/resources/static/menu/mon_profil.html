<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Utilisateur</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; position:relative;
        }

        /* Boutons fixes en haut */
        .buttons-container {
          position: fixed; top:20px; right:20px;
          display:flex; gap:10px; z-index:100;
        }
        .buttons-container button {
          background:#fff; color:#667eea; border:none; padding:8px 16px; border-radius:10px;
          font-size:0.95rem; font-weight:600; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,0.2); transition:all 0.2s;
        }
        .buttons-container button:hover { background:#667eea; color:#fff; }

        .profile-container {
          background:white; border-radius:24px; box-shadow:0 20px 60px rgba(0,0,0,0.3);
          overflow:hidden; width:100%; max-width:550px;
        }
        .header {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          padding:40px 30px; text-align:center; color:white;
          position: relative;
        }
        .profile-photo { width:120px; height:120px; border-radius:50%; border:4px solid white; margin-bottom:15px; object-fit:cover; }
        h1 { font-size:2rem; font-weight:700; margin-bottom:5px; }
        .profile-content { padding:30px; }
        .info-group { margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid #e5e7eb; }
        .info-group:last-child { border-bottom:none; }
        .info-label { font-size:0.85rem; color:#9ca3af; font-weight:600; margin-bottom:5px; }
        .info-value { font-size:1.1rem; color:#374151; font-weight:500; }
        .loading { text-align:center; padding:40px; color:#667eea; }
        .error { text-align:center; padding:40px; color:#dc2626; }

        /* Bouton discuter */
        .chat-button {
          background: linear-gradient(135deg, #10b981 0%, #059669 100%);
          color: white;
          border: none;
          padding: 12px 24px;
          border-radius: 25px;
          font-size: 1rem;
          font-weight: 600;
          cursor: pointer;
          box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
          transition: all 0.3s ease;
          display: flex;
          align-items: center;
          gap: 8px;
          margin: 20px auto;
          width: fit-content;
        }
        .chat-button:hover {
          transform: translateY(-2px);
          box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }
        .chat-button:active {
          transform: translateY(0);
        }

        /* Bouton modifier mon profil */
        .edit-profile-button {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: white;
          border: none;
          padding: 12px 24px;
          border-radius: 25px;
          font-size: 1rem;
          font-weight: 600;
          cursor: pointer;
          box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
          transition: all 0.3s ease;
          display: flex;
          align-items: center;
          gap: 8px;
          margin: 20px auto;
          width: fit-content;
        }
        .edit-profile-button:hover {
          transform: translateY(-2px);
          box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .edit-profile-button:active {
          transform: translateY(0);
        }

        /* Styles pour les favoris musicaux */
        .favoris-section {
          background:#f8f9ff;
          border:2px solid #e0e7ff;
          border-radius:12px;
          padding:20px;
          margin:20px 0;
        }
        .section-title {
          font-weight:700;
          color:#667eea;
          margin-bottom:15px;
          text-align:center;
          font-size:1.1rem;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 10px;
        }
        .favoris-item {
          display:flex;
          justify-content:space-between;
          align-items:center;
          padding:12px 0;
          border-bottom:1px solid #e5e7eb;
        }
        .favoris-item:last-child {
          border-bottom:none;
        }
        .favoris-genre {
          font-weight:600;
          color:#374151;
          font-size:1rem;
        }
        .favoris-cote {
          font-size:0.9rem;
          padding:6px 12px;
          border-radius:8px;
          font-weight:600;
          min-width: 60px;
          text-align: center;
        }
        .cote-10 { background:#dbeafe; color:#2563eb; border: 2px solid #2563eb; }
        .cote-9 { background:#dbeafe; color:#2563eb; }
        .cote-8 { background:#d1fae5; color:#059669; }
        .cote-7 { background:#d1fae5; color:#059669; }
        .cote-6 { background:#fef3c7; color:#d97706; }
        .cote-5 { background:#fef3c7; color:#d97706; }
        .cote-4 { background:#fef3c7; color:#d97706; }
        .cote-3 { background:#fee2e2; color:#dc2626; }
        .cote-2 { background:#fee2e2; color:#dc2626; }
        .cote-1 { background:#fee2e2; color:#dc2626; border: 2px solid #dc2626; }

        /* ==================================== */
        /* NOUVEAU STYLE POUR LES RÉSEAUX SOCIAUX (inspiré du premier code) */
        /* ==================================== */
        .reseaux-section {
          background: rgba(20, 20, 30, 0.7);
          border-radius: 20px;
          padding: 25px;
          margin: 25px 0;
          border: 1px solid rgba(100, 126, 234, 0.3);
          backdrop-filter: blur(10px);
          box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .reseaux-title {
          color: #FFFFFF;
          font-size: 1.8rem;
          margin-bottom: 30px;
          letter-spacing: 8px;
          text-transform: uppercase;
          text-align: center;
          font-weight: 300;
          text-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }

        .icons-grid {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 40px;
          justify-items: center;
          align-items: center;
          width: 100%;
          padding: 10px;
        }

        /* LOGOS GROS CERCLES */
        .reseau-icon-wrapper {
          width: 100%;
          max-width: 120px;
          aspect-ratio: 1 / 1;
          border-radius: 50%;
          overflow: hidden;
          cursor: pointer;
          transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
          background: rgba(255, 255, 255, 0.05);
          border: 2px solid rgba(255, 255, 255, 0.1);
          box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
          position: relative;
        }

        .reseau-icon-wrapper img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          display: block;
          filter: brightness(0.9);
          transition: all 0.3s ease;
        }

        .reseau-icon-wrapper:hover {
          transform: scale(1.25);
          box-shadow: 0 0 40px rgba(255, 255, 255, 0.4), 0 15px 40px rgba(0, 0, 0, 0.9);
          border-color: rgba(255, 255, 255, 0.3);
        }

        .reseau-icon-wrapper:hover img {
          filter: brightness(1.2);
          transform: scale(1.05);
        }

        /* Effets de couleur au survol */
        .reseau-icon-wrapper[data-network="twitter"]:hover {
          border-color: #1DA1F2;
          box-shadow: 0 0 50px #1DA1F2, 0 0 70px rgba(29, 161, 242, 0.6);
        }

        .reseau-icon-wrapper[data-network="instagram"]:hover {
          border-color: #E4405F;
          box-shadow: 0 0 50px #E4405F, 0 0 70px rgba(228, 64, 95, 0.6);
        }

        .reseau-icon-wrapper[data-network="facebook"]:hover {
          border-color: #1877F2;
          box-shadow: 0 0 50px #1877F2, 0 0 70px rgba(24, 119, 242, 0.6);
        }

        .reseau-icon-wrapper[data-network="linkedin"]:hover {
          border-color: #0A66C2;
          box-shadow: 0 0 50px #0A66C2, 0 0 70px rgba(10, 102, 194, 0.6);
        }

        .reseau-icon-wrapper[data-network="github"]:hover {
          border-color: #181717;
          box-shadow: 0 0 50px #181717, 0 0 70px rgba(24, 23, 23, 0.6);
        }

        .reseau-icon-wrapper[data-network="youtube"]:hover {
          border-color: #FF0000;
          box-shadow: 0 0 50px #FF0000, 0 0 70px rgba(255, 0, 0, 0.6);
        }

        .reseau-icon-wrapper[data-network="tiktok"]:hover {
          border-color: #00F2EA;
          box-shadow: 0 0 50px #00F2EA, 0 0 70px rgba(0, 242, 234, 0.6);
        }

        .reseau-icon-wrapper[data-network="discord"]:hover {
          border-color: #5865F2;
          box-shadow: 0 0 50px #5865F2, 0 0 70px rgba(88, 101, 242, 0.6);
        }

        .reseau-icon-wrapper[data-network="twitch"]:hover {
          border-color: #9146FF;
          box-shadow: 0 0 50px #9146FF, 0 0 70px rgba(145, 70, 255, 0.6);
        }

        .reseau-icon-wrapper[data-network="reddit"]:hover {
          border-color: #FF4500;
          box-shadow: 0 0 50px #FF4500, 0 0 70px rgba(255, 69, 0, 0.6);
        }

        .reseau-icon-wrapper[data-network="snapchat"]:hover {
          border-color: #FFFC00;
          box-shadow: 0 0 50px #FFFC00, 0 0 70px rgba(255, 252, 0, 0.6);
        }

        .reseau-icon-wrapper[data-network="whatsapp"]:hover {
          border-color: #25D366;
          box-shadow: 0 0 50px #25D366, 0 0 70px rgba(37, 211, 102, 0.6);
        }

        .reseau-icon-wrapper[data-network="telegram"]:hover {
          border-color: #26A5E4;
          box-shadow: 0 0 50px #26A5E4, 0 0 70px rgba(38, 165, 228, 0.6);
        }

        .reseau-icon-wrapper[data-network="spotify"]:hover {
          border-color: #1DB954;
          box-shadow: 0 0 50px #1DB954, 0 0 70px rgba(29, 185, 84, 0.6);
        }

        .reseau-icon-wrapper[data-network="default"]:hover {
          border-color: #667eea;
          box-shadow: 0 0 50px #667eea, 0 0 70px rgba(102, 126, 234, 0.6);
        }

        .no-content {
          color:#6b7280;
          font-style:italic;
          text-align:center;
          padding:15px;
        }

        /* Indicateur de son en cours */
        .son-playing-indicator {
          position: fixed;
          top: 20px;
          left: 20px;
          background: rgba(16, 185, 129, 0.9);
          color: white;
          padding: 8px 16px;
          border-radius: 20px;
          font-size: 0.9rem;
          font-weight: 600;
          z-index: 1000;
          display: none;
          align-items: center;
          gap: 8px;
          animation: pulse 2s infinite;
        }

        @keyframes pulse {
          0% { transform: scale(1); }
          50% { transform: scale(1.05); }
          100% { transform: scale(1); }
        }

        /* Responsive */
        @media (max-width: 768px) {
          .buttons-container {
            top: 10px;
            right: 10px;
            flex-direction: column;
            gap: 5px;
          }
          .buttons-container button {
            padding: 6px 12px;
            font-size: 0.85rem;
          }
          .profile-container {
            margin-top: 60px;
            max-width: 95%;
          }
          .reseaux-title {
            font-size: 1.5rem;
            letter-spacing: 6px;
          }
          .icons-grid {
            gap: 30px;
          }
          .reseau-icon-wrapper {
            max-width: 100px;
          }
        }

        @media (max-width: 480px) {
          .reseaux-title {
            font-size: 1.3rem;
            letter-spacing: 4px;
            margin-bottom: 25px;
          }
          .icons-grid {
            gap: 25px;
          }
          .reseau-icon-wrapper {
            max-width: 90px;
          }
        }

        @media (max-width: 360px) {
          .icons-grid {
            gap: 20px;
          }
          .reseau-icon-wrapper {
            max-width: 85px;
          }
        }
    </style>
</head>
<body>

<!-- Indicateur de son en cours -->
<div id="sonPlayingIndicator" class="son-playing-indicator">
    🔈 Son d'entrée en cours...
</div>

<div class="buttons-container">
    <button onclick="window.location.href='/menu/menu.html'">⬅ Retour</button>
    <button id="btnLogout">🚪 Déconnexion</button>
</div>

<div class="profile-container">
    <div class="header">
        <img id="profilePhoto" class="profile-photo" src="" alt="Photo de profil">
        <h1 id="profileUsername">Chargement...</h1>
    </div>

    <div class="profile-content" id="profileContent">
        <div class="loading">Chargement des informations...</div>
    </div>
</div>

<!-- Lecteur audio caché -->
<audio id="sonEntreePlayer" class="audio-player"></audio>

<script>
    const token = localStorage.getItem('accessToken');

    // Vérifier si l'utilisateur est connecté
    if (!token) {
        alert('Vous devez être connecté pour voir les profils');
        window.location.href = '/connection/connection.html';
    }

    // Variables pour stocker les données
    let currentUserId = null;
    let targetUserId = null;
    let currentUserData = null;

    // Récupérer l'ID depuis les paramètres d'URL
    function getUserIdFromURL() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('userId');
    }

    // Récupérer l'utilisateur courant
    async function getCurrentUser() {
        try {
            const response = await fetch('/api/users/me', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!response.ok) throw new Error('Erreur lors de la récupération du profil');
            return await response.json();
        } catch (error) {
            console.error('Erreur:', error);
            return null;
        }
    }

    // Fonction pour charger les favoris musicaux
    async function loadMusicFavoris(userId) {
        try {
            const response = await fetch(`/api/users/${userId}/music-favoris`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.ok) {
                const data = await response.json();
                return data.favoris || data;
            } else {
                return [];
            }
        } catch (err) {
            console.error('Erreur chargement favoris:', err);
            return [];
        }
    }

    // Fonction pour nettoyer l'URL des sauts de ligne
    function cleanUrl(url) {
        if (!url) return '';
        return url.replace(/\n/g, '').replace(/\r/g, '').trim();
    }

    // Fonction pour jouer le son d'entrée
    function playSonEntree(sonUrl) {
        if (!sonUrl) return;

        const cleanedUrl = cleanUrl(sonUrl);
        const audioPlayer = document.getElementById('sonEntreePlayer');
        const indicator = document.getElementById('sonPlayingIndicator');

        audioPlayer.src = cleanedUrl;
        audioPlayer.volume = 0.7;

        indicator.style.display = 'flex';

        audioPlayer.onplay = function() {
            console.log('🎵 Son d\'entrée en cours de lecture');
        };

        audioPlayer.onended = function() {
            indicator.style.display = 'none';
            console.log('🎵 Son d\'entrée terminé');
        };

        audioPlayer.onerror = function() {
            indicator.style.display = 'none';
            console.error('❌ Erreur lors de la lecture du son');
        };

        audioPlayer.play().catch(error => {
            console.error('Erreur de lecture audio:', error);
            indicator.style.display = 'none';
        });
    }

    // Fonction pour obtenir l'icône du réseau social
    function getReseauIconInfo(url) {
        url = url.toLowerCase();

        const platformMap = {
            'twitter.com': { network: 'twitter', logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/twitter.png' },
            'x.com': { network: 'twitter', logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/twitter.png' },
            'facebook.com': { network: 'facebook', logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/facebook.png' },
            'instagram.com': { network: 'instagram', logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/instagram.png' },
            'linkedin.com': { network: 'linkedin', logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/linkedin.png' },
            'github.com': { network: 'github', logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/github.png' },
            'youtube.com': { network: 'youtube', logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/youtube.png' },
            'tiktok.com': { network: 'tiktok', logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/tiktok.png' },
            'discord.com': { network: 'discord', logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/discord.png' },
            'discord.gg': { network: 'discord', logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/discord.png' },
            'twitch.tv': { network: 'twitch', logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/twitch.png' },
            'reddit.com': { network: 'reddit', logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/reddit.png' },
            'snapchat.com': { network: 'snapchat', logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/snap.png' },
            'whatsapp.com': { network: 'whatsapp', logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/whatsapp.png' },
            'telegram.org': { network: 'telegram', logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/telegram.png' },
            't.me': { network: 'telegram', logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/telegram.png' },
            'spotify.com': { network: 'spotify', logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/spotify.png' }
        };

        for (const [domain, info] of Object.entries(platformMap)) {
            if (url.includes(domain)) {
                return info;
            }
        }

        return {
            network: 'default',
            logo: 'https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/default.png'
        };
    }

    // Fonction pour afficher les favoris musicaux
    function displayMusicFavoris(favoris) {
        if (!favoris || favoris.length === 0) {
            return `
                <div class="favoris-section">
                    <div class="section-title">🎵 Favoris Musicaux</div>
                    <div class="no-content">Aucun favori musical défini</div>
                </div>
            `;
        }

        const sortedFavoris = [...favoris].sort((a, b) => b.cotePreference - a.cotePreference);

        let html = `
            <div class="favoris-section">
                <div class="section-title">🎵 Favoris Musicaux</div>
        `;

        sortedFavoris.forEach(favori => {
            const coteClass = `cote-${favori.cotePreference}`;

            html += `
                <div class="favoris-item">
                    <span class="favoris-genre">${favori.musicGenreDescription}</span>
                    <span class="favoris-cote ${coteClass}">${favori.cotePreference}/10</span>
                </div>
            `;
        });

        html += `</div>`;
        return html;
    }

    // Fonction pour afficher les réseaux sociaux dans la nouvelle mise en page
    function displayReseaux(reseauxList) {
        if (!reseauxList || reseauxList.trim() === '') {
            return `
                <div class="reseaux-section">
                    <div class="reseaux-title">FOLLOW ME</div>
                    <div class="no-content">Aucun réseau social ajouté</div>
                </div>
            `;
        }

        const reseauxArray = reseauxList.split(';').filter(url => url.trim() !== '');

        if (reseauxArray.length === 0) {
            return `
                <div class="reseaux-section">
                    <div class="reseaux-title">FOLLOW ME</div>
                    <div class="no-content">Aucun réseau social ajouté</div>
                </div>
            `;
        }

        let html = `
            <div class="reseaux-section">
                <div class="reseaux-title">FOLLOW ME</div>
                <div class="icons-grid">
        `;

        reseauxArray.forEach((url, index) => {
            const cleanedUrl = cleanUrl(url);
            const reseauInfo = getReseauIconInfo(cleanedUrl);

            html += `
                <a href="${cleanedUrl}" target="_blank" class="reseau-icon-wrapper" data-network="${reseauInfo.network}" title="Visiter le profil">
                    <img src="${reseauInfo.logo}" alt="Logo ${reseauInfo.network}" onerror="this.src='https://raw.githubusercontent.com/djhustla/music-storage/main/logos_reseaux/default.png'">
                </a>
            `;
        });

        // Si le nombre de réseaux est impair, ajouter un élément vide pour garder l'alignement
        if (reseauxArray.length % 2 !== 0) {
            html += `<div style="max-width: 120px; aspect-ratio: 1 / 1;"></div>`;
        }

        html += `
                </div>
            </div>
        `;
        return html;
    }

    async function loadUserProfile() {
        targetUserId = getUserIdFromURL();

        if (!targetUserId) {
            document.getElementById('profileContent').innerHTML = `
                <div class="error">ID utilisateur manquant dans l'URL</div>
            `;
            return;
        }

        try {
            // Récupérer l'utilisateur courant
            currentUserData = await getCurrentUser();
            if (!currentUserData) {
                throw new Error('Impossible de récupérer votre profil');
            }

            currentUserId = currentUserData.id;

            // Charger les données du profil cible
            const response = await fetch(`/api/users/${targetUserId}`, {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) {
                if (response.status === 404) {
                    throw new Error('Utilisateur non trouvé');
                }
                throw new Error('Erreur lors du chargement du profil');
            }

            const user = await response.json();

            // Mettre à jour l'interface
            document.getElementById('profileUsername').textContent = user.username;
            document.getElementById('profilePhoto').src = user.photoUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.username)}&size=120&background=667eea&color=fff`;

            // Gestion de l'erreur de chargement de l'image
            document.getElementById('profilePhoto').onerror = function() {
                this.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.username)}&size=120&background=667eea&color=fff`;
            };

            // JOUER LE SON D'ENTRÉE IMMÉDIATEMENT
            if (user.sonEntreeURL) {
                playSonEntree(user.sonEntreeURL);
            }

            // Vérifier si c'est le profil de l'utilisateur courant
            const isCurrentUser = (currentUserId.toString() === targetUserId.toString());

            // Charger et afficher les favoris musicaux
            const favoris = await loadMusicFavoris(targetUserId);
            const favorisSection = displayMusicFavoris(favoris);

            // Afficher les réseaux sociaux dans le nouveau style
            const reseauxSection = displayReseaux(user.listeReseaux);

            // Afficher les informations du profil
            document.getElementById('profileContent').innerHTML = `
                <div class="info-group">
                    <div class="info-label">Nom d'utilisateur</div>
                    <div class="info-value">${user.username}</div>
                </div>
                <div class="info-group">
                    <div class="info-label">Email</div>
                    <div class="info-value">${user.email}</div>
                </div>
                <div class="info-group">
                    <div class="info-label">Rôle</div>
                    <div class="info-value">${user.role}</div>
                </div>
                <div class="info-group">
                    <div class="info-label">Membre depuis</div>
                    <div class="info-value">${new Date(user.createdAt).toLocaleDateString('fr-FR')}</div>
                </div>

                ${favorisSection}
                ${reseauxSection}

                <!-- Boutons d'action -->
                <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
                    <!-- Bouton Discuter - affiché seulement si ce n'est PAS l'utilisateur courant -->
                    ${!isCurrentUser ? `
                        <button class="chat-button" onclick="startConversation('${user.id}', '${user.username}')">
                            💬 Discuter avec ${user.username}
                        </button>
                    ` : ''}

                    <!-- Bouton Modifier mon profil - affiché seulement si c'est l'utilisateur courant -->
                    ${isCurrentUser ? `
                        <button class="edit-profile-button" onclick="editProfile()">
                            ✏️ Modifier mon profil
                        </button>
                    ` : ''}
                </div>
            `;

        } catch(error) {
            console.error('Erreur:', error);
            document.getElementById('profileContent').innerHTML = `
                <div class="error">
                    ${error.message}
                    <br><br>
                    <button onclick="loadUserProfile()" style="margin-top:10px; padding:8px 16px; background:#667eea; color:white; border:none; border-radius:8px; cursor:pointer;">
                        Réessayer
                    </button>
                </div>
            `;
        }
    }

    // Fonction pour démarrer une conversation
    function startConversation(userId, username) {
        window.location.href = `/menu/ma_communaute/conversation.html?userId=${userId}`;
    }

    // Fonction pour modifier le profil
    function editProfile() {
        window.location.href = '/menu/modifier_profil.html';
    }

    // Déconnexion
    document.getElementById('btnLogout').addEventListener('click', async () => {
        const refreshToken = localStorage.getItem('refreshToken');

        try {
            if (refreshToken) {
                await fetch('/api/auth/logout', {
                    method: 'POST',
                    headers: { 'Content-Type':'application/json' },
                    body: JSON.stringify({ refreshToken })
                });
            }

            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            alert('Déconnexion réussie');
            window.location.href = '/connection/connection.html';

        } catch(err) {
            console.error('Erreur déconnexion:', err);
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            window.location.href = '/connection/connection.html';
        }
    });

    // Charger le profil au démarrage
    document.addEventListener('DOMContentLoaded', loadUserProfile);
</script>

</body>
</html>
