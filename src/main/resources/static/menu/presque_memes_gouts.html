<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concordance Moyenne - Music Social</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height: 100vh;
          padding: 15px;
        }
        .main-container {
          width: 100%; max-width: 1000px; margin: 0 auto;
          background: white; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
          overflow: hidden; min-height: 90vh; display: flex; flex-direction: column;
        }
        .header {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          padding: 25px 20px; color: white; text-align: center;
        }
        .header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
        .header .subtitle { font-size: 0.9rem; opacity: 0.9; max-width: 500px; margin: 0 auto; }
        .action-buttons {
          display: flex; justify-content: space-between; padding: 12px 20px;
          background: #f0f5ff; border-bottom: 2px solid #d6e4ff;
          flex-wrap: wrap; gap: 10px;
        }
        .btn {
          padding: 10px 16px; border-radius: 8px; font-weight: 600; font-size: 0.9rem;
          cursor: pointer; transition: all 0.3s; text-decoration: none;
          display: inline-flex; align-items: center; gap: 5px; border: 2px solid transparent;
        }
        .btn-menu { background: #667eea; color: white; }
        .btn-menu:hover { background: #5a67d8; transform: translateY(-2px); }
        .btn-logout { background: #333; color: white; border: none; font-family: inherit; }
        .btn-logout:hover { background: #222; transform: translateY(-2px); }
        .content { padding: 20px; flex: 1; }
        .message { padding: 14px; border-radius: 10px; margin-bottom: 15px; border: 2px solid; text-align: center; }
        .error-message { background: #fee; color: #dc2626; border-color: #fecaca; display: none; }
        .loading-message { background: #e0f2fe; color: #0369a1; border-color: #bae6fd; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .info-message { background: #fff3cd; color: #856404; border-color: #ffeaa7; display: none; }
        .stats-container { display: flex; justify-content: center; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .stat-card { background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 10px; text-align: center; min-width: 100px; flex: 1; max-width: 180px; }
        .stat-number { font-size: 1.5rem; font-weight: 700; display: block; }
        .stat-label { font-size: 0.8rem; opacity: 0.9; }
        .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 15px; }
        .user-card { background: #f0f5ff; border-radius: 14px; padding: 18px; border: 2px solid #d6e4ff; transition: all 0.3s; }
        .user-card:hover { border-color: #667eea; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(102,126,234,0.15); }
        .user-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 2px solid #d6e4ff; }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #667eea; flex-shrink: 0; }
        .avatar-placeholder { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: white; border: 2px solid #667eea; flex-shrink: 0; }
        .user-info { flex-grow: 1; min-width: 0; }
        .user-name { font-weight: 700; font-size: 1.1rem; color: #374151; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-email { font-size: 0.85rem; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cause-badge { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 5px 10px; border-radius: 15px; font-size: 0.8rem; font-weight: 600; flex-shrink: 0; }
        .cause-text { background: white; padding: 10px; border-radius: 8px; border: 1px solid #d6e4ff; margin-top: 10px; font-size: 0.85rem; color: #667eea; text-align: center; }
        .profile-link { display: block; width: 100%; margin-top: 12px; padding: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-align: center; border-radius: 8px; font-weight: 600; text-decoration: none; transition: all 0.3s; }
        .profile-link:hover { background: linear-gradient(135deg, #5a67d8 0%, #68428f 100%); transform: translateY(-2px); }
        .empty-state { text-align: center; padding: 30px 15px; color: #6b7280; }
        .empty-state-icon { font-size: 3rem; margin-bottom: 15px; opacity: 0.5; }
        .empty-state-title { font-size: 1.3rem; margin-bottom: 10px; color: #374151; }
        .empty-state-text { line-height: 1.5; max-width: 450px; margin: 0 auto 20px; font-size: 0.9rem; }
        .refresh-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .footer { text-align: center; padding: 12px; color: #6b7280; font-size: 0.8rem; border-top: 2px solid #d6e4ff; margin-top: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-spinner { width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; }
        @media (max-width: 768px) {
          body { padding: 10px; }
          .header { padding: 20px 15px; }
          .header h1 { font-size: 1.5rem; }
          .action-buttons { flex-direction: column; }
          .btn { width: 100%; justify-content: center; }
          .users-grid { grid-template-columns: 1fr; }
          .stat-card { min-width: 90px; }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="header">
        <h1>🎵 Concordance Moyenne</h1>
        <p class="subtitle">Personnes avec des goûts similaires (cotes 7+/10)</p>
        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-number" id="totalUsers">0</span>
                <span class="stat-label">Concordances</span>
            </div>
        </div>
    </div>

    <div class="action-buttons">
        <a href="/menu/menu.html" class="btn btn-menu">← Retour au menu</a>
        <button id="logoutBtn" class="btn btn-logout">🚪 Déconnexion</button>
    </div>

    <div class="content">
        <div class="message loading-message" id="loadingMessage">
            <div class="loading-spinner"></div> Recherche des concordances...
        </div>
        <div class="message error-message" id="errorMessage">
            ❌ <span id="errorText"></span>
        </div>
        <div class="message info-message" id="infoMessage">
            ℹ️ <span id="infoText"></span>
        </div>

        <div class="users-grid" id="usersGrid"></div>

        <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">🎵</div>
            <div class="empty-state-title">Aucune concordance trouvée</div>
            <div class="empty-state-text">
                Personne n'a des goûts similaires (cotes 7+/10) avec vous pour le moment.
            </div>
            <button class="refresh-btn" id="refreshBtn">🔄 Actualiser</button>
        </div>
    </div>

    <div class="footer">
        <p>Dernière mise à jour: <span id="lastUpdate">--:--</span></p>
    </div>
</div>

<script>
    const CONFIG = {
      apiBaseUrl: '/api/music-favoris',
      token: localStorage.getItem('accessToken'),
      currentUser: JSON.parse(localStorage.getItem('userData') || '{}')
    };

    const DOM = {
      loadingMessage: document.getElementById('loadingMessage'),
      errorMessage: document.getElementById('errorMessage'),
      errorText: document.getElementById('errorText'),
      infoMessage: document.getElementById('infoMessage'),
      infoText: document.getElementById('infoText'),
      usersGrid: document.getElementById('usersGrid'),
      emptyState: document.getElementById('emptyState'),
      refreshBtn: document.getElementById('refreshBtn'),
      logoutBtn: document.getElementById('logoutBtn'),
      totalUsers: document.getElementById('totalUsers'),
      lastUpdate: document.getElementById('lastUpdate')
    };

    class ConcordanceMoyenneManager {
      constructor() {
        this.users = [];
        this.initialized = false;
      }

      async init() {
        try {
          this.checkAuth();
          this.setupEventListeners();
          await this.loadUsers();
          this.updateLastUpdate();
          this.initialized = true;
        } catch (error) {
          this.showError('Erreur d\'initialisation', error);
        }
      }

      checkAuth() {
        if (!CONFIG.token) {
          alert('Connectez-vous pour accéder à cette page');
          window.location.href = '/connection/connection.html';
        }
      }

      setupEventListeners() {
        DOM.logoutBtn.addEventListener('click', () => {
          localStorage.removeItem('accessToken');
          localStorage.removeItem('userData');
          window.location.href = '/connection/connection.html';
        });
        DOM.refreshBtn.addEventListener('click', () => this.refresh());
      }

      async loadUsers() {
        try {
          DOM.loadingMessage.style.display = 'flex';
          DOM.errorMessage.style.display = 'none';
          DOM.usersGrid.style.display = 'none';
          DOM.emptyState.style.display = 'none';

          const response = await fetch(`${CONFIG.apiBaseUrl}/me/concordence-moyenne`, {
            headers: { 'Authorization': `Bearer ${CONFIG.token}` }
          });

          if (response.status === 401) {
            localStorage.removeItem('accessToken');
            window.location.href = '/connection/connection.html';
            return;
          }

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }

          const data = await response.json();

          if (!data.success) {
            throw new Error(data.error || 'Erreur serveur');
          }

          this.users = data.users || [];
          this.renderUsers();
          DOM.totalUsers.textContent = data.count || 0;

          if (this.users.length === 0) {
            this.showEmptyState(data.message);
          }

        } catch (error) {
          this.showError('Impossible de charger les concordances', error);
        } finally {
          DOM.loadingMessage.style.display = 'none';
        }
      }

      renderUsers() {
        if (this.users.length === 0) {
          DOM.usersGrid.style.display = 'none';
          DOM.emptyState.style.display = 'block';
          return;
        }

        DOM.usersGrid.innerHTML = '';
        DOM.usersGrid.style.display = 'grid';
        DOM.emptyState.style.display = 'none';

        this.users.forEach(user => {
          DOM.usersGrid.appendChild(this.createUserCard(user));
        });
      }

      createUserCard(user) {
        const card = document.createElement('div');
        card.className = 'user-card';

        const avatarHtml = user.photoUrl
          ? `<img src="${user.photoUrl}" alt="${user.username}" class="user-avatar"
               onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\"avatar-placeholder\">${(user.username || '?')[0].toUpperCase()}</div>';">`
          : `<div class="avatar-placeholder">${(user.username || '?')[0].toUpperCase()}</div>`;

        card.innerHTML = `
          <div class="user-card-header">
            ${avatarHtml}
            <div class="user-info">
              <div class="user-name">${this.escapeHtml(user.username || 'Utilisateur')}</div>
              <div class="user-email">${this.escapeHtml(user.email || '')}</div>
            </div>
            <div class="cause-badge">Goûts similaires</div>
          </div>
          <div class="cause-text">Partage des goûts (cotes 7+/10)</div>
          <a href="/menu/profil_user.html?userId=${user.id}" class="profile-link">
            👤 Voir le profil
          </a>
        `;

        return card;
      }

      showEmptyState(message) {
        DOM.emptyState.style.display = 'block';
        if (message) {
          const title = DOM.emptyState.querySelector('.empty-state-title');
          if (title) title.textContent = message;
        }
      }

      showError(context, error) {
        DOM.errorText.textContent = `${context}: ${error.message || 'Erreur inconnue'}`;
        DOM.errorMessage.style.display = 'block';
        DOM.loadingMessage.style.display = 'none';

        if (error.message.includes('401')) {
          setTimeout(() => window.location.href = '/connection/connection.html', 2000);
        }
      }

      updateLastUpdate() {
        DOM.lastUpdate.textContent = new Date().toLocaleTimeString('fr-FR', {
          hour: '2-digit', minute: '2-digit'
        });
      }

      async refresh() {
        await this.loadUsers();
        this.updateLastUpdate();
        this.showInfo('Liste actualisée', 2000);
      }

      showInfo(message, duration = 3000) {
        DOM.infoText.textContent = message;
        DOM.infoMessage.style.display = 'block';
        setTimeout(() => DOM.infoMessage.style.display = 'none', duration);
      }

      escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new ConcordanceMoyenneManager().init();
    });
</script>
</body>
</html>
