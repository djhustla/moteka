<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Recommandations — Moteka</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --sp:       #1DB954;
      --sp-dim:   rgba(29,185,84,0.15);
      --sp-glow:  rgba(29,185,84,0.3);
      --gold:     #f59e0b;
      --gold-dim: rgba(245,158,11,0.15);
      --bg:       #080808;
      --s1:       #0f0f0f;
      --s2:       #161616;
      --s3:       #1e1e1e;
      --s4:       #252525;
      --text:     #ffffff;
      --t2:       #b3b3b3;
      --t3:       #6a6a6a;
      --border:   rgba(255,255,255,0.06);
      --border2:  rgba(255,255,255,0.10);
      --nav-h:    64px;
      --safe-b:   env(safe-area-inset-bottom, 0px);
      --r:        12px;
      --r-lg:     18px;
      --ease:     cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-top: var(--nav-h);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── NAVBAR ─── */
    .fixed-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 200;
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      padding-left: calc(20px + env(safe-area-inset-left));
      padding-right: calc(20px + env(safe-area-inset-right));
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-icon {
      width: 34px; height: 34px;
      background: var(--sp);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .nav-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .nav-back {
      width: 38px; height: 38px;
      background: var(--s3);
      border: 1px solid var(--border2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--t2);
      text-decoration: none;
      font-size: 0.85rem;
      transition: background 0.2s var(--ease), color 0.2s var(--ease), transform 0.15s var(--ease);
      flex-shrink: 0;
    }
    .nav-back:hover { background: var(--s4); color: var(--text); transform: scale(1.05); }
    .nav-back:active { transform: scale(0.95); }

    /* ─── LAYOUT ─── */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 16px calc(40px + var(--safe-b));
    }

    /* ─── HERO HEADER ─── */
    .hero {
      margin-bottom: 36px;
      padding: 28px 24px;
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, var(--sp-dim), transparent 70%);
      pointer-events: none;
    }

    .hero-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--sp);
      margin-bottom: 8px;
    }

    .hero-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.15;
      margin-bottom: 8px;
    }

    .hero-sub {
      font-size: 0.85rem;
      color: var(--t2);
      font-weight: 400;
      line-height: 1.5;
    }

    .hero-badges {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .pill-green { background: var(--sp-dim); color: var(--sp); border: 1px solid var(--sp-glow); }
    .pill-gold  { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(245,158,11,0.3); }

    /* ─── SECTION ─── */
    .section { margin-bottom: 32px; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .section-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .si-green { background: var(--sp-dim); color: var(--sp); }
    .si-gold  { background: var(--gold-dim); color: var(--gold); }

    .section-label {
      flex: 1;
    }
    .section-label h2 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label p {
      font-size: 0.75rem;
      color: var(--t3);
      margin-top: 2px;
    }

    .badge {
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .badge-sp   { background: var(--sp); color: #000; }
    .badge-gold { background: var(--gold); color: #000; }

    /* ─── GENRE CARDS (accordion) ─── */
    .genres-list { display: flex; flex-direction: column; gap: 10px; }

    .genre-card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      transition: border-color 0.2s var(--ease);
    }
    .genre-card.open { border-color: var(--border2); }

    .genre-header {
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.15s var(--ease);
    }
    .genre-header:hover { background: rgba(255,255,255,0.02); }
    .genre-header:active { background: rgba(255,255,255,0.04); }

    .genre-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--sp);
      flex-shrink: 0;
      box-shadow: 0 0 8px var(--sp-glow);
    }

    .genre-name {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.2px;
      flex: 1;
    }

    .genre-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .meta-chip {
      background: var(--s3);
      border: 1px solid var(--border);
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 0.7rem;
      color: var(--t2);
      font-weight: 500;
    }

    .chevron {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--s3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: var(--t3);
      transition: transform 0.3s var(--ease), background 0.2s;
      flex-shrink: 0;
    }
    .genre-card.open .chevron {
      transform: rotate(180deg);
      background: var(--s4);
      color: var(--t2);
    }

    .genre-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s var(--ease);
    }
    .genre-card.open .genre-content { max-height: 9999px; }

    .genre-inner {
      padding: 0 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 -18px;
    }

    /* ─── SUB SECTION ─── */
    .sub-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--t3);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-top: 18px;
    }
    .sub-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ─── MUSIC CARDS ─── */
    .musiques-list { display: flex; flex-direction: column; gap: 8px; }

    .music-card {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      cursor: pointer;
      display: flex;
      align-items: stretch;
      transition: border-color 0.2s var(--ease), background 0.2s var(--ease), transform 0.15s var(--ease);
      min-height: 72px;
      text-decoration: none;
      color: inherit;
    }
    .music-card:hover {
      border-color: var(--border2);
      background: var(--s3);
    }
    .music-card:active { transform: scale(0.99); }

    .music-thumb {
      width: 72px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      background: var(--s3);
    }
    .music-thumb iframe {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      border: none;
      pointer-events: none;
    }
    .music-thumb-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--s3);
      color: var(--sp);
      font-size: 1.4rem;
    }

    .music-info {
      flex: 1;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .music-title {
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 5px;
    }

    .music-stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stat {
      font-size: 0.7rem;
      color: var(--t3);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stat i { font-size: 0.6rem; color: var(--sp); }

    .music-arrow {
      width: 40px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--t3);
      font-size: 0.7rem;
      transition: color 0.2s, transform 0.2s;
    }
    .music-card:hover .music-arrow { color: var(--t2); transform: translateX(2px); }

    /* ─── ARTIST CARDS ─── */
    .artistes-list { display: flex; flex-direction: column; gap: 6px; }

    .artist-card {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s var(--ease), background 0.2s var(--ease), transform 0.15s var(--ease);
    }
    .artist-card:hover { border-color: var(--border2); background: var(--s3); }
    .artist-card:active { transform: scale(0.99); }

    .artist-photo {
      width: 44px; height: 44px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--s3);
    }

    .artist-info { flex: 1; min-width: 0; }

    .artist-name {
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .artist-genres {
      font-size: 0.72rem;
      color: var(--t3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .artist-arrow {
      font-size: 0.7rem;
      color: var(--t3);
      transition: color 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .artist-card:hover .artist-arrow { color: var(--t2); transform: translateX(2px); }

    /* ─── LOADING ─── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 16px;
    }
    .loader-ring {
      width: 44px; height: 44px;
      border: 2.5px solid var(--s3);
      border-top-color: var(--sp);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 0.85rem; color: var(--t3); }

    /* ─── EMPTY STATE ─── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
      color: var(--t3);
      gap: 10px;
    }
    .empty i { font-size: 2.5rem; opacity: 0.4; }
    .empty p { font-size: 0.85rem; }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: calc(24px + var(--safe-b));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--s4);
      color: var(--text);
      border: 1px solid var(--border2);
      padding: 11px 22px;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.25s var(--ease), transform 0.25s var(--ease);
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── REVEAL ANIMATION ─── */
    .reveal {
      opacity: 0;
      transform: translateY(12px);
      animation: reveal 0.4s var(--ease) forwards;
    }
    @keyframes reveal {
      to { opacity: 1; transform: none; }
    }
    .section:nth-child(1) .reveal { animation-delay: 0.05s; }
    .section:nth-child(2) .reveal { animation-delay: 0.10s; }
    .genre-card:nth-child(1) { animation-delay: 0.08s; }
    .genre-card:nth-child(2) { animation-delay: 0.13s; }
    .genre-card:nth-child(3) { animation-delay: 0.18s; }

    /* ─── RESPONSIVE ─── */
    @media (min-width: 600px) {
      .page { padding: 32px 24px calc(48px + var(--safe-b)); }
      .hero { padding: 32px 30px; }
      .genre-header { padding: 18px 22px; }
      .genre-inner { padding: 0 22px 22px; gap: 28px; }
      .music-thumb { width: 90px; }
    }

    @media (max-width: 480px) {
      .meta-chip { display: none; }
      .genre-meta { gap: 6px; }
      .hero-title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<!-- ── NAV ── -->
<nav class="fixed-nav">
  <div class="nav-brand">
    <div class="nav-icon">🎧</div>
    <span class="nav-title">Recommandations</span>
  </div>
  <a href="menu.html" class="nav-back">
    <i class="fas fa-arrow-left"></i>
  </a>
</nav>

<!-- ── MAIN ── -->
<div class="page">

  <!-- Hero -->
  <div class="hero reveal">
    <div class="hero-eyebrow">Moteka · Pour vous</div>
    <h1 class="hero-title">Votre musique,<br>amplifiée.</h1>
    <p class="hero-sub">Recommandations personnalisées basées sur vos genres favoris.</p>
    <div class="hero-badges">
      <span class="pill pill-green"><i class="fas fa-heart"></i> Coups de cœur 10/10</span>
      <span class="pill pill-gold"><i class="fas fa-thumbs-up"></i> Vous aimez 7/10</span>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading" class="loading">
    <div class="loader-ring"></div>
    <p>Chargement de vos recommandations…</p>
  </div>

  <!-- Content -->
  <div id="content" style="display:none;"></div>

</div>

<div id="toast" class="toast"></div>

<script>
  let currentUserId = null;

  async function getCurrentUser() {
      const token = localStorage.getItem('accessToken');
      if (!token) { showToast('❌ Non connecté.', true); return null; }
      try {
          const res = await fetch('/api/users/me', { headers: { 'Authorization': 'Bearer ' + token } });
          if (!res.ok) throw new Error('Token invalide');
          const data = await res.json();
          return data.id;
      } catch (e) {
          console.error('Erreur récupération utilisateur:', e);
          showToast('❌ Erreur de connexion', true);
          return null;
      }
  }

  async function loadRecommendations() {
      if (!currentUserId) return;
      const loadingDiv = document.getElementById('loading');
      const contentDiv = document.getElementById('content');
      try {
          const response = await fetch(`/api/recommendations/users/${currentUserId}`);
          const data = await response.json();
          if (!data.success) throw new Error(data.error || 'Erreur lors du chargement');
          renderRecommendations(data);
          loadingDiv.style.display = 'none';
          contentDiv.style.display = 'block';
      } catch (error) {
          console.error('Erreur:', error);
          loadingDiv.innerHTML = `
              <div class="empty">
                  <i class="fas fa-exclamation-triangle"></i>
                  <p>${error.message}</p>
                  <button onclick="location.reload()" style="margin-top:12px;padding:10px 22px;background:var(--sp);border:none;border-radius:30px;color:#000;font-family:'Outfit',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;">Réessayer</button>
              </div>
          `;
      }
  }

  function sortMusiquesByPopularity(musiques) {
      if (!musiques) return [];
      return [...musiques].sort((a, b) => (b.popularite || 0) - (a.popularite || 0));
  }

  function sortArtistesByName(artistes) {
      if (!artistes) return [];
      return [...artistes].sort((a, b) => (a.username || '').localeCompare(b.username || ''));
  }

  function renderRecommendations(data) {
      const recommendations = data.recommendations;
      const contentDiv = document.getElementById('content');
      let html = '';

      if (recommendations.genres_cote_10 && recommendations.genres_cote_10.length > 0) {
          html += `
              <div class="section reveal">
                  <div class="section-header">
                      <div class="section-icon si-green"><i class="fas fa-heart"></i></div>
                      <div class="section-label">
                          <h2>Coups de cœur <span class="badge badge-sp">10/10</span></h2>
                          <p>${recommendations.genres_cote_10.length} genre${recommendations.genres_cote_10.length > 1 ? 's' : ''}</p>
                      </div>
                  </div>
                  <div class="genres-list">
          `;
          recommendations.genres_cote_10.forEach(genre => { html += renderGenreCard(genre); });
          html += `</div></div>`;
      }

      if (recommendations.genres_cote_7 && recommendations.genres_cote_7.length > 0) {
          html += `
              <div class="section reveal">
                  <div class="section-header">
                      <div class="section-icon si-gold"><i class="fas fa-thumbs-up"></i></div>
                      <div class="section-label">
                          <h2>Vous aimez aussi <span class="badge badge-gold">7/10</span></h2>
                          <p>${recommendations.genres_cote_7.length} genre${recommendations.genres_cote_7.length > 1 ? 's' : ''}</p>
                      </div>
                  </div>
                  <div class="genres-list">
          `;
          recommendations.genres_cote_7.forEach(genre => { html += renderGenreCard(genre); });
          html += `</div></div>`;
      }

      if (!html) {
          html = `
              <div class="empty reveal">
                  <i class="fas fa-music"></i>
                  <p>Aucune recommandation pour le moment.</p>
                  <p style="font-size:0.78rem;margin-top:4px;">Définissez vos genres favoris dans votre profil.</p>
              </div>
          `;
      }

      contentDiv.innerHTML = html;
      attachCardEvents();
  }

  function renderGenreCard(genre) {
      const musiques = sortMusiquesByPopularity(genre.musiques);
      const artistes = sortArtistesByName(genre.artistes);
      return `
          <div class="genre-card" data-genre="${escapeHtml(genre.genre)}">
              <div class="genre-header">
                  <div class="genre-dot"></div>
                  <div class="genre-name">${escapeHtml(genre.genre)}</div>
                  <div class="genre-meta">
                      <span class="meta-chip">🎵 ${musiques.length}</span>
                      <span class="meta-chip">🎤 ${artistes.length}</span>
                      <div class="chevron"><i class="fas fa-chevron-down"></i></div>
                  </div>
              </div>
              <div class="genre-content">
                  <div class="genre-inner">
                      ${renderMusiquesSection(musiques)}
                      ${renderArtistesSection(artistes)}
                  </div>
              </div>
          </div>
      `;
  }

  function renderMusiquesSection(musiques) {
      if (!musiques || musiques.length === 0) {
          return `
              <div>
                  <div class="sub-label"><i class="fas fa-music"></i> Musiques</div>
                  <div class="empty" style="padding:20px 0;"><p>Aucune musique dans ce genre.</p></div>
              </div>
          `;
      }
      let html = `
          <div>
              <div class="sub-label"><i class="fas fa-music"></i> Musiques · ${musiques.length}</div>
              <div class="musiques-list">
      `;
      musiques.forEach(music => {
          const youtubeId = getYoutubeId(music.lienYoutube);
          html += `
              <div class="music-card" onclick="goToMusicDetail(${music.id})">
                  <div class="music-thumb">
                      ${youtubeId
                          ? `<iframe src="https://www.youtube.com/embed/${youtubeId}" allowfullscreen></iframe>`
                          : `<div class="music-thumb-icon"><i class="fas fa-music"></i></div>`}
                  </div>
                  <div class="music-info">
                      <div class="music-title">${escapeHtml(music.titre)}</div>
                      <div class="music-stats">
                          <span class="stat"><i class="fas fa-fire"></i> ${music.popularite || 0}%</span>
                          <span class="stat"><i class="fas fa-star"></i> ${music.note || 0}/10</span>
                      </div>
                  </div>
                  <div class="music-arrow"><i class="fas fa-chevron-right"></i></div>
              </div>
          `;
      });
      html += `</div></div>`;
      return html;
  }

  function renderArtistesSection(artistes) {
      if (!artistes || artistes.length === 0) {
          return `
              <div>
                  <div class="sub-label"><i class="fas fa-users"></i> Artistes</div>
                  <div class="empty" style="padding:20px 0;"><p>Aucun artiste dans ce genre.</p></div>
              </div>
          `;
      }
      let html = `
          <div>
              <div class="sub-label"><i class="fas fa-users"></i> Artistes · ${artistes.length}</div>
              <div class="artistes-list">
      `;
      artistes.forEach(artist => {
          html += `
              <a href="/menu/profil_artist.html?userId=${artist.id}" class="artist-card">
                  <img src="${artist.photoUrl || 'https://via.placeholder.com/44'}" class="artist-photo" alt="${escapeHtml(artist.username)}">
                  <div class="artist-info">
                      <div class="artist-name">${escapeHtml(artist.username)}</div>
                      <div class="artist-genres">${(artist.genres || []).map(g => escapeHtml(g)).join(' · ')}</div>
                  </div>
                  <div class="artist-arrow"><i class="fas fa-chevron-right"></i></div>
              </a>
          `;
      });
      html += `</div></div>`;
      return html;
  }

  function attachCardEvents() {
      document.querySelectorAll('.genre-card').forEach(card => {
          card.querySelector('.genre-header').addEventListener('click', () => {
              card.classList.toggle('open');
          });
      });
  }

  function getYoutubeId(url) {
      if (!url) return null;
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
  }

  function goToMusicDetail(musicId) {
      window.location.href = `/menu/voir_morceau_encoder.html?musicId=${musicId}`;
  }

  function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.background = isError ? '#c0392b' : 'var(--s4)';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
  }

  window.goToMusicDetail = goToMusicDetail;

  document.addEventListener('DOMContentLoaded', async () => {
      currentUserId = await getCurrentUser();
      if (!currentUserId) {
          document.getElementById('loading').innerHTML = `
              <div class="empty">
                  <i class="fas fa-lock"></i>
                  <p>Veuillez vous connecter.</p>
                  <a href="/connection/connection.html" style="display:inline-block;margin-top:12px;padding:10px 22px;background:var(--sp);border-radius:30px;color:#000;font-family:'Outfit',sans-serif;font-weight:700;font-size:0.85rem;text-decoration:none;">Se connecter</a>
              </div>
          `;
          return;
      }
      await loadRecommendations();
  });
</script>
</body>
</html>
