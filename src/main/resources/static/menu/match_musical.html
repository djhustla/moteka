<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Musical Parfait</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
          font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height:100vh;
          padding:20px;
          position: relative;
        }

        /* Boutons fixes en haut */
        .fixed-header {
          position: fixed;
          top: 20px;
          left: 50%;
          transform: translateX(-50%);
          display: flex;
          gap: 15px;
          padding: 0;
          background: transparent;
          z-index: 1000;
          flex-wrap: wrap;
          justify-content: center;
          max-width: 90%;
        }

        .fixed-header button {
          padding: 12px 20px;
          border: none;
          border-radius: 12px;
          font-size: 0.95rem;
          font-weight: 600;
          cursor: pointer;
          transition: all 0.3s ease;
          font-family: inherit;
          display: flex;
          align-items: center;
          gap: 8px;
          box-shadow: 0 4px 15px rgba(0,0,0,0.2);
          white-space: nowrap;
        }

        .fixed-header button::before {
          font-size: 1.1rem;
        }

        .btn-retour {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: white;
        }

        .btn-retour:hover {
          transform: translateY(-2px);
          box-shadow: 0 6px 20px rgba(102,126,234,0.4);
        }

        .btn-deconnexion {
          background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
          color: white;
        }

        .btn-deconnexion:hover {
          transform: translateY(-2px);
          box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        /* Responsive pour petits écrans */
        @media (max-width: 480px) {
          .fixed-header {
            top: 15px;
            gap: 10px;
          }

          .fixed-header button {
            padding: 10px 16px;
            font-size: 0.9rem;
          }
        }

        .container {
          max-width:800px;
          margin:0 auto;
          margin-top: 80px;
        }

        .header {
          background: white;
          border-radius:20px;
          padding:30px;
          text-align:center;
          margin-bottom:25px;
          box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
          font-size:2.2rem;
          font-weight:700;
          color:#1f2937;
          margin-bottom:10px;
        }

        .subtitle {
          font-size:1rem;
          color:#6b7280;
        }

        .users-grid {
          display:grid;
          grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
          gap:20px;
          margin-bottom:30px;
        }

        .user-card {
          background:white;
          border-radius:16px;
          padding:25px;
          text-align:center;
          box-shadow:0 8px 25px rgba(0,0,0,0.1);
          transition:all 0.3s;
          border:3px solid transparent;
        }

        .user-card:hover {
          transform:translateY(-5px);
          box-shadow:0 15px 35px rgba(0,0,0,0.15);
          border-color:#667eea;
        }

        .user-avatar {
          width:80px;
          height:80px;
          border-radius:50%;
          object-fit:cover;
          margin:0 auto 15px;
          border:3px solid #667eea;
        }

        .user-name {
          font-size:1.3rem;
          font-weight:600;
          color:#1f2937;
          margin-bottom:8px;
        }

        .user-email {
          color:#6b7280;
          font-size:0.9rem;
          margin-bottom:15px;
        }

        .match-badge {
          background:linear-gradient(135deg, #10b981, #059669);
          color:white;
          padding:6px 12px;
          border-radius:20px;
          font-size:0.8rem;
          font-weight:600;
          display:inline-block;
          margin-bottom:15px;
        }

        .user-actions {
          display:flex;
          gap:10px;
          justify-content:center;
          margin-top:15px;
        }

        .btn-profil, .btn-dm {
          padding:8px 16px;
          border:none;
          border-radius:8px;
          cursor:pointer;
          font-weight:600;
          font-size:0.85rem;
          transition:0.3s;
          flex:1;
        }

        .btn-profil {
          background:#3b82f6;
          color:white;
        }

        .btn-profil:hover {
          background:#2563eb;
        }

        .btn-dm {
          background:#10b981;
          color:white;
        }

        .btn-dm:hover {
          background:#059669;
        }

        .no-users {
          background:white;
          border-radius:16px;
          padding:50px 30px;
          text-align:center;
          grid-column:1/-1;
        }

        .no-users-icon {
          font-size:4rem;
          margin-bottom:20px;
        }

        .no-users h3 {
          font-size:1.5rem;
          color:#1f2937;
          margin-bottom:10px;
        }

        .no-users p {
          color:#6b7280;
          font-size:1rem;
        }

        .loading {
          text-align:center;
          padding:50px;
          color:white;
          font-size:1.2rem;
        }

        @media (max-width:768px) {
          .header { padding:25px 20px; }
          h1 { font-size:1.8rem; }
          .users-grid { grid-template-columns:1fr; }
        }

        @media (max-width:480px) {
          .header { padding:20px 15px; }
          h1 { font-size:1.5rem; }
          .user-actions {
            flex-direction:column;
          }
        }
    </style>
</head>
<body>

<!-- Boutons fixes en haut -->
<div class="fixed-header">
    <button id="btnRetour" class="btn-retour" data-icon="⬅️">Retour</button>
    <button id="btnDeconnexion" class="btn-deconnexion" data-icon="🚪">Déconnexion</button>
</div>

<div class="container">
    <div class="header">
        <h1>💫 Match Musical Parfait</h1>
        <p class="subtitle">Utilisateurs avec exactement les mêmes préférences musicales que vous</p>
    </div>

    <div id="usersList" class="users-grid">
        <div class="loading">🔍 Recherche de vos matchs parfaits...</div>
    </div>
</div>

<script>
    const token = localStorage.getItem('accessToken');
    if (!token) {
      alert('Vous devez être connecté');
      window.location.href = '/connection/connection.html';
    }

    // Bouton Retour
    document.getElementById("btnRetour").addEventListener("click", () => {
      window.location.href = "/menu/style_music_users.html";
    });

    // Bouton Déconnexion
    document.getElementById("btnDeconnexion").addEventListener("click", async () => {
      const refreshToken = localStorage.getItem('refreshToken');

      try {
        if (refreshToken) {
          await fetch('/api/auth/logout', {
            method: 'POST',
            headers: { 'Content-Type':'application/json' },
            body: JSON.stringify({ refreshToken })
          });
        }

        localStorage.removeItem('accessToken');
        localStorage.removeItem('refreshToken');
        alert('Déconnexion réussie');
        window.location.href = '/index.html';

      } catch (err) {
        alert('Erreur réseau lors de la déconnexion');
      }
    });

    async function loadPerfectMatches() {
      try {
        console.log('🔍 Chargement des matchs...');

        const response = await fetch('/api/users/me/same-music-favoris', {
          headers: { 'Authorization': 'Bearer ' + token }
        });

        console.log('📡 Statut réponse:', response.status);

        if (response.ok) {
          const data = await response.json();
          console.log('📦 Données reçues:', data);

          const users = data.users || [];
          console.log('👥 Utilisateurs:', users);

          displayUsers(users);
        } else {
          console.error('❌ Erreur HTTP:', response.status);
          document.getElementById('usersList').innerHTML = `
            <div class="no-users">
              <div class="no-users-icon">😔</div>
              <h3>Aucun match parfait trouvé</h3>
              <p>Personne n'a exactement les mêmes goûts musicaux que vous pour le moment.</p>
            </div>
          `;
        }
      } catch (err) {
        console.error('❌ Erreur complète:', err);
        document.getElementById('usersList').innerHTML = `
          <div class="no-users">
            <div class="no-users-icon">❌</div>
            <h3>Erreur de chargement</h3>
            <p>Impossible de charger les matchs musicaux: ${err.message}</p>
          </div>
        `;
      }
    }

    function displayUsers(users) {
      const usersList = document.getElementById('usersList');

      console.log('🎨 Affichage de', users.length, 'utilisateurs');

      if (!users || users.length === 0) {
        usersList.innerHTML = `
          <div class="no-users">
            <div class="no-users-icon">😔</div>
            <h3>Aucun match parfait trouvé</h3>
            <p>Personne n'a exactement les mêmes goûts musicaux que vous pour le moment.</p>
          </div>
        `;
        return;
      }

      usersList.innerHTML = users.map(user => `
        <div class="user-card">
          <img src="${escapeHtml(user.photoUrl || '/default-avatar.png')}"
               alt="${escapeHtml(user.username)}"
               class="user-avatar"
               onerror="this.src='/default-avatar.png'">
          <div class="user-name">${escapeHtml(user.username)}</div>
          <div class="user-email">${escapeHtml(user.email)}</div>
          <div class="match-badge">🎯 Match Parfait</div>
          <div class="user-actions">
            <button class="btn-profil" onclick="viewProfile(${user.id})">👤 Voir Profil</button>
            <button class="btn-dm" onclick="startConversation(${user.id}, '${escapeHtml(user.username)}')">💬 DM</button>
          </div>
        </div>
      `).join('');

      console.log('✅ Affichage terminé');
    }

    // Fonction de sécurité pour échapper le HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function viewProfile(userId) {
      // MODIFICATION ICI : utilisation de profil_user.html
      window.location.href = '/menu/profil_user.html?userId=' + userId;
    }

    function startConversation(userId, username) {
      window.location.href = '/menu/ma_communaute/conversation.html?userId=' + userId;
    }

    // Charger les matchs au démarrage
    loadPerfectMatches();
</script>
</body>
</html>
