<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration - Gestion des Utilisateurs</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
    }

    /* ==================================== */
    /* PAGE DE CONNEXION                     */
    /* ==================================== */
    .login-container {
        max-width: 400px;
        margin: 100px auto;
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .login-container h2 {
        color: #333;
        margin-bottom: 30px;
        text-align: center;
        font-size: 2rem;
    }

    .login-container input {
        width: 100%;
        padding: 15px;
        margin-bottom: 20px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 1rem;
        transition: all 0.3s;
    }

    .login-container input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .login-container button {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
    }

    .login-container button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .login-container button:active {
        transform: translateY(0);
    }

    .error-message {
        color: #e74c3c;
        text-align: center;
        margin-top: 15px;
        font-weight: 600;
        animation: shake 0.5s ease;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
    }

    /* ==================================== */
    /* PAGE PRINCIPALE                        */
    /* ==================================== */
    .admin-container {
        max-width: 1400px;
        margin: 0 auto;
        display: none;
    }

    .admin-header {
        background: white;
        border-radius: 15px;
        padding: 25px 30px;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
    }

    .header-title h1 {
        color: #333;
        font-size: 1.8rem;
        margin-bottom: 5px;
    }

    .header-title p {
        color: #666;
        font-size: 0.95rem;
    }

    .header-stats {
        display: flex;
        gap: 20px;
    }

    .stat-box {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 15px 25px;
        border-radius: 10px;
        text-align: center;
    }

    .stat-box .stat-number {
        font-size: 2rem;
        font-weight: 700;
        line-height: 1;
    }

    .stat-box .stat-label {
        font-size: 0.85rem;
        opacity: 0.9;
        margin-top: 5px;
    }

    .logout-btn {
        background: #e74c3c;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .logout-btn:hover {
        background: #c0392b;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
    }

    /* ==================================== */
    /* TABLEAU                                */
    /* ==================================== */
    .table-container {
        background: white;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        overflow-x: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1200px;
    }

    th {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 15px 10px;
        font-size: 0.9rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        white-space: nowrap;
    }

    th:first-child {
        border-radius: 10px 0 0 0;
    }

    th:last-child {
        border-radius: 0 10px 0 0;
    }

    td {
        padding: 15px 10px;
        border-bottom: 1px solid #e0e0e0;
        color: #333;
        font-size: 0.9rem;
    }

    tr:hover {
        background: #f8f9fa;
    }

    /* Miniature photo */
    .photo-thumb {
        width: 50px;
        height: 50px;
        border-radius: 10px;
        object-fit: cover;
        border: 2px solid #667eea;
    }

    .photo-thumb.default {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 1.2rem;
    }

    /* Réseaux sociaux */
    .reseaux-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    .reseau-link {
        display: inline-block;
        padding: 5px 10px;
        background: #f0f0f0;
        border-radius: 5px;
        color: #333;
        text-decoration: none;
        font-size: 0.8rem;
        transition: all 0.3s;
    }

    .reseau-link:hover {
        background: #667eea;
        color: white;
        transform: translateY(-2px);
    }

    /* Bouton Play */
    .play-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        color: white;
        font-size: 1.2rem;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .play-btn:hover:not(:disabled) {
        transform: scale(1.1);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .play-btn:disabled {
        background: #ccc;
        cursor: not-allowed;
        opacity: 0.5;
    }

    .play-btn.playing {
        background: #e74c3c;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
    }

    /* Badge rôle */
    .role-badge {
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
        text-align: center;
        display: inline-block;
    }

    .role-badge.admin {
        background: #e74c3c;
        color: white;
    }

    .role-badge.user {
        background: #3498db;
        color: white;
    }

    /* Donnée visible */
    .donnee-visible {
        font-family: monospace;
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 2px;
    }

    .donnee-visible span {
        display: inline-block;
        width: 25px;
        height: 25px;
        line-height: 25px;
        text-align: center;
        border-radius: 5px;
        margin: 0 2px;
    }

    .donnee-visible .visible {
        background: #2ecc71;
        color: white;
    }

    .donnee-visible .hidden {
        background: #e74c3c;
        color: white;
    }

    /* Bouton détails */
    .details-btn {
        padding: 8px 15px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-block;
    }

    .details-btn:hover {
        background: #2980b9;
        transform: translateY(-2px);
    }

    /* Loading */
    .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255,255,255,0.9);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .loading-spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* Audio player caché */
    .audio-player {
        display: none;
    }

    /* Message d'erreur */
    .alert {
        padding: 15px 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-weight: 600;
    }

    .alert-error {
        background: #fde8e8;
        color: #e74c3c;
        border: 2px solid #e74c3c;
    }

    .alert-success {
        background: #e8f8f5;
        color: #27ae60;
        border: 2px solid #27ae60;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .admin-header {
            flex-direction: column;
            text-align: center;
        }

        .header-stats {
            width: 100%;
            justify-content: center;
        }

        .login-container {
            margin: 50px 20px;
            padding: 30px;
        }
    }
  </style>
</head>
<body>

<!-- Page de connexion -->
<div id="loginPage" class="login-container">
  <h2>🔐 Administration</h2>
  <input type="password" id="passwordInput" placeholder="Mot de passe" autofocus>
  <button onclick="checkPassword()">Se connecter</button>
  <div id="loginError" class="error-message"></div>
</div>

<!-- Page principale (cachée par défaut) -->
<div id="adminPage" class="admin-container">
  <div class="admin-header">
    <div class="header-title">
      <h1>👥 Gestion des Utilisateurs</h1>
      <p>Tableau de bord administrateur</p>
    </div>
    <div class="header-stats">
      <div class="stat-box">
        <div class="stat-number" id="totalUsers">0</div>
        <div class="stat-label">Utilisateurs</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="adminCount">0</div>
        <div class="stat-label">Administrateurs</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">
      <span>🚪</span> Déconnexion
    </button>
  </div>

  <!-- Tableau des utilisateurs -->
  <div class="table-container">
    <table id="usersTable">
      <thead>
      <tr>
        <th>Photo</th>
        <th>Username</th>
        <th>Email</th>
        <th>Téléphone</th>
        <th>Rôle</th>
        <th>Date création</th>
        <th>Donnée Visible</th>
        <th>Réseaux sociaux</th>
        <th>Son</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody id="usersTableBody">
      <!-- Les données seront injectées ici -->
      </tbody>
    </table>
  </div>
</div>

<!-- Loading overlay -->
<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-spinner"></div>
</div>

<!-- Audio player caché -->
<audio id="audioPlayer" class="audio-player"></audio>

<script>
  const ADMIN_PASSWORD = "ttmk";
  let currentlyPlaying = null;
  let audioPlayer = document.getElementById('audioPlayer');
  let usersData = [];

  // ================================================
  // VÉRIFICATION DU MOT DE PASSE
  // ================================================
  function checkPassword() {
      const password = document.getElementById('passwordInput').value;
      const errorDiv = document.getElementById('loginError');

      if (password === ADMIN_PASSWORD) {
          // Connexion réussie
          document.getElementById('loginPage').style.display = 'none';
          document.getElementById('adminPage').style.display = 'block';
          loadUsers();
      } else {
          errorDiv.textContent = '❌ Mot de passe incorrect';
          document.getElementById('passwordInput').value = '';
          document.getElementById('passwordInput').focus();
      }
  }

  // ================================================
  // GESTION DU CHARGEMENT
  // ================================================
  function showLoading() {
      document.getElementById('loadingOverlay').style.display = 'flex';
  }

  function hideLoading() {
      document.getElementById('loadingOverlay').style.display = 'none';
  }

  // ================================================
  // DÉCONNEXION
  // ================================================
  function logout() {
      document.getElementById('adminPage').style.display = 'none';
      document.getElementById('loginPage').style.display = 'block';
      document.getElementById('passwordInput').value = '';
      document.getElementById('loginError').textContent = '';
      document.getElementById('passwordInput').focus();

      // Arrêter la lecture audio si en cours
      if (audioPlayer) {
          audioPlayer.pause();
          audioPlayer.currentTime = 0;
      }
      currentlyPlaying = null;
  }

  // ================================================
  // FORMATAGE DE LA DATE
  // ================================================
  function formatDate(dateString) {
      if (!dateString) return 'N/A';
      const date = new Date(dateString);
      return date.toLocaleDateString('fr-FR', {
          day: '2-digit',
          month: '2-digit',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
      });
  }

  // ================================================
  // AFFICHAGE DES RÉSEAUX SOCIAUX
  // ================================================
  function displayReseaux(listeReseaux) {
      if (!listeReseaux || listeReseaux.trim() === '') {
          return '<span style="color: #999;">Aucun réseau</span>';
      }

      const urls = listeReseaux.split(';').filter(url => url.trim() !== '');

      return urls.map(url => {
          const cleanUrl = url.trim();
          let displayName = cleanUrl.replace('https://', '').replace('http://', '').split('/')[0];

          return `<a href="${cleanUrl}" target="_blank" class="reseau-link" title="${cleanUrl}">
              ${displayName}
          </a>`;
      }).join('');
  }

  // ================================================
  // AFFICHAGE DE LA DONNÉE VISIBLE
  // ================================================
  function displayDonneeVisible(donneeVisible) {
      if (!donneeVisible || donneeVisible.length < 3) {
          donneeVisible = "110";
      }

      const photo = donneeVisible[0] === '1' ? '📸' : '🔒';
      const son = donneeVisible[1] === '1' ? '🔊' : '🔇';
      const reseaux = donneeVisible[2] === '1' ? '🌐' : '🔒';

      return `
          <div class="donnee-visible">
              <span class="${donneeVisible[0] === '1' ? 'visible' : 'hidden'}" title="Photo">${photo}</span>
              <span class="${donneeVisible[1] === '1' ? 'visible' : 'hidden'}" title="Son">${son}</span>
              <span class="${donneeVisible[2] === '1' ? 'visible' : 'hidden'}" title="Réseaux">${reseaux}</span>
          </div>
      `;
  }

  // ================================================
  // LECTURE DU SON
  // ================================================
  function playSon(sonUrl, userId, button) {
      if (!sonUrl) return;

      if (currentlyPlaying === userId) {
          // Arrêter la lecture
          audioPlayer.pause();
          audioPlayer.currentTime = 0;
          button.classList.remove('playing');
          button.innerHTML = '▶';
          currentlyPlaying = null;
      } else {
          // Arrêter la lecture précédente
          if (currentlyPlaying !== null) {
              const previousButton = document.querySelector(`.play-btn[data-user-id="${currentlyPlaying}"]`);
              if (previousButton) {
                  previousButton.classList.remove('playing');
                  previousButton.innerHTML = '▶';
              }
          }

          // Lire le nouveau son
          audioPlayer.src = sonUrl;
          audioPlayer.play();
          button.classList.add('playing');
          button.innerHTML = '⏸';
          currentlyPlaying = userId;

          // Gestion de la fin de lecture
          audioPlayer.onended = function() {
              button.classList.remove('playing');
              button.innerHTML = '▶';
              currentlyPlaying = null;
          };
      }
  }

  // ================================================
  // CHARGEMENT DES UTILISATEURS
  // ================================================
  async function loadUsers() {
      showLoading();

      try {
          const token = localStorage.getItem('accessToken');

          const response = await fetch('/api/users/all', {
              method: 'GET',
              headers: {
                  'Authorization': token ? 'Bearer ' + token : '',
                  'Content-Type': 'application/json'
              }
          });

          if (!response.ok) {
              throw new Error('Erreur lors du chargement des utilisateurs');
          }

          const data = await response.json();
          usersData = data.users || [];

          // Mise à jour des statistiques
          document.getElementById('totalUsers').textContent = usersData.length;
          const adminCount = usersData.filter(user => user.role === 'ADMIN').length;
          document.getElementById('adminCount').textContent = adminCount;

          // Remplir le tableau
          const tbody = document.getElementById('usersTableBody');
          tbody.innerHTML = '';

          usersData.forEach(user => {
              const photoHtml = user.photoUrl && user.photoUrl !== ''
                  ? `<img src="${user.photoUrl}" alt="Photo" class="photo-thumb" onerror="this.src='https://ui-avatars.com/api/?name=${user.username}&size=50&background=667eea&color=fff'">`
                  : `<div class="photo-thumb default">${user.username.charAt(0).toUpperCase()}</div>`;

              const sonButton = user.sonEntreeURL && user.sonEntreeURL !== ''
                  ? `<button class="play-btn" data-user-id="${user.id}" onclick="playSon('${user.sonEntreeURL}', ${user.id}, this)">▶</button>`
                  : `<button class="play-btn" disabled>▶</button>`;

              const roleClass = user.role === 'ADMIN' ? 'admin' : 'user';

              const row = document.createElement('tr');
              row.innerHTML = `
                  <td>${photoHtml}</td>
                  <td><strong>${user.username || 'N/A'}</strong></td>
                  <td>${user.email || 'N/A'}</td>
                  <td>${user.phoneNumber || 'N/A'}</td>
                  <td><span class="role-badge ${roleClass}">${user.role || 'USER'}</span></td>
                  <td>${formatDate(user.createdAt)}</td>
                  <td>${displayDonneeVisible(user.donneeVisible)}</td>
                  <td><div class="reseaux-list">${displayReseaux(user.listeReseaux)}</div></td>
                  <td>${sonButton}</td>


                  <td>
                      <a href="/menu/user_detail.html?userId=${user.id}" class="details-btn">
                        Détails
                      </a>
                  </td>


              `;
              tbody.appendChild(row);
          });

      } catch (error) {
          console.error('Erreur:', error);

          // Afficher l'erreur dans le tableau
          const tbody = document.getElementById('usersTableBody');
          tbody.innerHTML = `
              <tr>
                  <td colspan="10" style="text-align: center; padding: 40px; color: #e74c3c;">
                      ❌ Erreur lors du chargement des données : ${error.message}<br>
                      <button onclick="loadUsers()" style="margin-top: 15px; padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer;">
                          Réessayer
                      </button>
                  </td>
              </tr>
          `;

          document.getElementById('totalUsers').textContent = '0';
          document.getElementById('adminCount').textContent = '0';
      } finally {
          hideLoading();
      }
  }

  // ================================================
  // GESTION DE LA TOUCHE ENTRÉE
  // ================================================
  document.getElementById('passwordInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
          checkPassword();
      }
  });

  // ================================================
  // INITIALISATION
  // ================================================
  // Vérifier si déjà connecté (optionnel - avec localStorage)
  // Pour l'instant, on laisse la page de connexion s'afficher
</script>
</body>
</html>
