<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma Bibliothèque Musicale</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
        --sp: #1DB954;
        --sp2: #1ed760;
        --bg: #060606;
        --card-bg: #121212;
        --text: #ffffff;
        --muted: #a7a7a7;
        --border: rgba(255,255,255,0.08);
        --nav-h: 70px;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Syne', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        padding-top: var(--nav-h);
        min-height: 100vh;
    }

    /* Navigation */
    .fixed-nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--nav-h);
        z-index: 1000;
        background: rgba(6,6,6,0.95);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
    }

    .nav-title {
        font-size: 1.2rem;
        font-weight: 800;
        color: var(--sp);
    }

    .nav-menu-btn {
        height: 44px;
        background: var(--sp);
        color: black;
        padding: 0 24px;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    /* Conteneur principal */
    .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 30px 20px;
    }

    /* Grille responsive */
    .music-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 25px;
    }

    /* Carte musique */
    .music-card {
        background: var(--card-bg);
        border-radius: 16px;
        border: 1px solid var(--border);
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        display: flex;
        flex-direction: column;
    }

    .music-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        border-color: rgba(29,185,84,0.3);
    }

    /* En-tête de la carte */
    .card-header {
        padding: 20px 20px 10px;
        border-bottom: 1px solid var(--border);
    }

    .card-title {
        font-size: 1.1rem;
        font-weight: 800;
        color: var(--text);
        line-height: 1.4;
        margin-bottom: 5px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .card-subtitle {
        font-family: 'DM Mono', monospace;
        font-size: 0.75rem;
        color: var(--sp);
    }

    /* Zone des lecteurs - 2 éléments de même largeur (YouTube + Spotify) */
    .media-section {
        display: flex;
        flex-direction: column;
        gap: 15px;
        padding: 15px 20px 20px;
    }

    .media-item {
        width: 100%;
        border-radius: 12px;
        overflow: hidden;
        background: #0a0a0a;
        border: 1px solid var(--border);
    }

    .media-item iframe {
        width: 100%;
        height: 200px;
        display: block;
        border: none;
    }

    /* Pied de carte - maintenant avec le nom de l'encodeur */
    .card-footer {
        padding: 15px 20px 20px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: 'DM Mono', monospace;
        font-size: 0.8rem;
        color: var(--muted);
    }

    .popularity {
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .popularity i {
        color: var(--sp);
    }

    .encoder-info {
        display: flex;
        align-items: center;
        gap: 5px;
        color: var(--sp);
        font-weight: 600;
    }

    .encoder-info i {
        color: var(--sp);
        font-size: 0.9rem;
    }

    /* États de chargement et erreur */
    .loading-state, .error-state, .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 80px 20px;
        color: var(--muted);
    }

    .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--border);
        border-top-color: var(--sp);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 20px;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
        .fixed-nav {
            padding: 0 20px;
        }

        .music-grid {
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .media-item iframe {
            height: 180px;
        }
    }

    @media (max-width: 480px) {
        :root {
            --nav-h: 60px;
        }

        .fixed-nav {
            padding: 0 15px;
        }

        .nav-title {
            font-size: 1rem;
        }

        .nav-menu-btn {
            padding: 0 15px;
            font-size: 0.85rem;
        }

        .container {
            padding: 20px 15px;
        }

        .card-header {
            padding: 15px 15px 8px;
        }

        .media-section {
            padding: 10px 15px 15px;
            gap: 10px;
        }

        .media-item iframe {
            height: 160px;
        }

        .card-footer {
            padding: 12px 15px 15px;
            font-size: 0.7rem;
        }
    }
  </style>
</head>
<body>
<nav class="fixed-nav">
  <div class="nav-title">🎵 MA MUSICOTHÈQUE</div>
  <a href="menu.html" class="nav-menu-btn">
    <i class="fa fa-arrow-left"></i> <span>MENU</span>
  </a>
</nav>

<div class="container">
  <div id="musicGrid" class="music-grid">
    <div class="loading-state">
      <div class="spinner"></div>
      <div>Chargement de votre bibliothèque...</div>
    </div>
  </div>
</div>

<script>
  async function loadMusic() {
      const grid = document.getElementById('musicGrid');

      try {
          // Récupérer toutes les musiques
          const response = await fetch('/api/music/all');
          const data = await response.json();

          if (!data.success) {
              throw new Error(data.error || 'Erreur inconnue');
          }

          const musicList = data.data || [];

          if (musicList.length === 0) {
              grid.innerHTML = `
                  <div class="empty-state">
                      <i class="fa fa-music" style="font-size: 3rem; color: var(--muted); margin-bottom: 20px;"></i>
                      <div>Aucune musique trouvée</div>
                  </div>
              `;
              return;
          }

          // Pour chaque musique, récupérer le nom de l'utilisateur
          const cardsHtml = await Promise.all(musicList.map(async (music) => {
              // Récupérer le nom de l'utilisateur
              let username = 'Inconnu';
              try {
                  const userRes = await fetch(`/api/users/${music.userId}`);
                  const userData = await userRes.json();
                  username = userData.username || 'Inconnu';
              } catch (e) {
                  console.error(`Erreur pour l'utilisateur ${music.userId}:`, e);
              }

              // Construction des URLs embed
              const youtubeEmbed = music.lienYoutube ?
                  music.lienYoutube.replace('watch?v=', 'embed/').split('&')[0] : '';

              const spotifyEmbed = music.lienSpotify ?
                  music.lienSpotify.replace('track/', 'embed/track/') : '';

              return `
                  <div class="music-card">
                      <div class="card-header">
                          <div class="card-title">${music.titre || 'Titre inconnu'}</div>
                          <div class="card-subtitle">ID: ${music.id}</div>
                      </div>

                      <div class="media-section">
                          ${youtubeEmbed ? `
                              <div class="media-item">
                                  <iframe src="${youtubeEmbed}"
                                          allowfullscreen
                                          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
                                  </iframe>
                              </div>
                          ` : `
                              <div class="media-item" style="display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted);">
                                  <i class="fab fa-youtube" style="font-size: 2rem; margin-right: 10px;"></i>
                                  <span>YouTube non disponible</span>
                              </div>
                          `}

                          ${spotifyEmbed ? `
                              <div class="media-item">
                                  <iframe src="${spotifyEmbed}"
                                          allow="encrypted-media">
                                  </iframe>
                              </div>
                          ` : `
                              <div class="media-item" style="display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted);">
                                  <i class="fab fa-spotify" style="font-size: 2rem; margin-right: 10px;"></i>
                                  <span>Spotify non disponible</span>
                              </div>
                          `}
                      </div>

                      <div class="card-footer">
                          <span class="encoder-info">
                              <i class="fa fa-user"></i> encodé par ${username}
                          </span>
                          <span class="popularity">
                              <i class="fa fa-fire"></i>
                              ${music.popularite !== undefined ? music.popularite : 'N/A'}
                          </span>
                      </div>
                  </div>
              `;
          }));

          grid.innerHTML = cardsHtml.join('');

      } catch (error) {
          console.error('Erreur:', error);
          grid.innerHTML = `
              <div class="error-state">
                  <i class="fa fa-exclamation-triangle" style="font-size: 3rem; color: #ff5555; margin-bottom: 20px;"></i>
                  <div>Erreur de chargement: ${error.message}</div>
                  <button onclick="loadMusic()" style="margin-top: 20px; padding: 10px 30px; background: var(--sp); color: black; border: none; border-radius: 30px; cursor: pointer;">
                      Réessayer
                  </button>
              </div>
          `;
      }
  }

  // Chargement au démarrage
  document.addEventListener('DOMContentLoaded', loadMusic);
</script>
</body>
</html>
