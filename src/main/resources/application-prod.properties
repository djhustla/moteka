# application-prod.properties
server.port=${PORT:8080}

# Configuration Neon.tech
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Upload fichiers
#server.servlet.multipart.max-file-size=10MB
#server.servlet.multipart.max-request-size=10MB

# Augmenter les limites de multipart
# spring.servlet.multipart.max-file-size=100MB
# spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true

# Alternative avec tomcat si nÕcessaire
server.tomcat.max-swallow-size=100MB







# Taille maximale par fichier (lÕgÒrement plus que 1,08 GB pour õtre s«r)
spring.servlet.multipart.max-file-size=1200MB
# spring.servlet.multipart.max-request-size=1200MB

# Configuration Tomcat
server.tomcat.max-http-form-post-size=1200MB

# DÕlai d'attente pour upload lent (en millisecondes)
spring.servlet.multipart.max-request-size=1200MB
server.connection-timeout=300000  # 5 minutes









# Logging
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.main=DEBUG

# H2 Console dÕsactivÕe
spring.h2.console.enabled=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-expiration=900000
jwt.refresh-expiration=604800000


# src/main/resources/application.properties




# Twilio
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER}




# GitHub
github.token=${GITHUB_TOKEN}
github.username=${GITHUB_USERNAME}
github.repo=${GITHUB_REPO}

#stripe
stripe.secret-key=${STRIPE_SECRET_KEY}


# === Configuration Mailjet API ===
mailjet.api.key=maCle
mailjet.api.secret=monSecret